- id: touch_button_monitor
  mode: restart
  then:
  - while:
      condition:
        lambda: 'return true;'  # Run forever
      then:
        - lambda: |-
            // Button states - one for each button
            static float baseline[4] = {NAN, NAN, NAN, NAN};
            static float last_value[4] = {NAN, NAN, NAN, NAN};
            static float peak_value[4] = {0, 0, 0, 0};
            static int init_count[4] = {0, 0, 0, 0};
            static bool button_pressed[4] = {false, false, false, false};
            static int pressed_log_counter[4] = {0, 0, 0, 0};

            // GPIO pins for each button
            const int gpio_pins[4] = {10, 11, 12, 13};  // Buttons 1-4

            // Process all 4 buttons
            for (int btn = 0; btn < 4; btn++) {
              // Read touch value directly using touchRead
              float value = (float)touchRead(gpio_pins[btn]);

              // Skip if value is invalid
              if (value <= 0 || value > 100000) {
                ESP_LOGD("touch_monitor", "Button %d invalid touch value: %.0f", btn+1, value);
                continue;
              }

              // Initialize baseline
              if (isnan(baseline[btn]) || init_count[btn] < 20) {
                if (isnan(baseline[btn])) baseline[btn] = value;
                baseline[btn] = baseline[btn] * 0.9 + value * 0.1;
                last_value[btn] = value;
                init_count[btn]++;
                if (init_count[btn] == 20) {
                  ESP_LOGI("touch_monitor", "Button %d baseline initialized: %.0f", btn+1, baseline[btn]);
                }
                continue;
              }

              // Calculate jump from last reading
              float jump = value - last_value[btn];

              // Detect touch on 400+ jump
              if (jump > 400 && !button_pressed[btn]) {
                ESP_LOGI("touch_monitor", "BUTTON %d PRESSED! Value: %.0f, Last: %.0f, Jump: %.0f",
                         btn+1, value, last_value[btn], jump);
                button_pressed[btn] = true;
                peak_value[btn] = value;  // Initialize peak with current value

                // Trigger the button press and play unique beep
                if (btn == 0) {
                  id(button_1_state) = true;
                  id(buzzer).play("b1:d=32,o=5,b=240:c");  // C note
                  // Directly call UI handler
                  id(ui_navigation_handler).execute(1);
                }
                else if (btn == 1) {
                  id(button_2_state) = true;
                  id(buzzer).play("b2:d=32,o=5,b=240:e");  // E note
                  // Directly call UI handler
                  id(ui_navigation_handler).execute(2);
                }
                else if (btn == 2) {
                  id(button_3_state) = true;
                  id(buzzer).play("b3:d=32,o=5,b=240:g");  // G note
                  // Directly call UI handler
                  id(ui_navigation_handler).execute(3);
                }
                else if (btn == 3) {
                  id(button_4_state) = true;
                  id(buzzer).play("b4:d=32,o=6,b=240:c");  // High C note (octave 6)
                  // Directly call UI handler
                  id(ui_navigation_handler).execute(4);
                }

              } else if (button_pressed[btn]) {
                // Update peak if current value is higher
                if (value > peak_value[btn]) {
                  peak_value[btn] = value;
                }

                // Release if value drops significantly from peak OR returns closer to baseline
                float drop_from_peak = peak_value[btn] - value;
                float rise_from_baseline = value - baseline[btn];

                // Log only occasionally while pressed to reduce spam
                if (++pressed_log_counter[btn] >= 5) {  // Every second at 200ms interval
                  ESP_LOGD("touch_monitor", "Button %d pressed - Value: %.0f, Peak: %.0f, Drop: %.0f, Rise: %.0f",
                           btn+1, value, peak_value[btn], drop_from_peak, rise_from_baseline);
                  pressed_log_counter[btn] = 0;
                }

                // More forgiving thresholds:
                // Release if dropped 250+ from peak OR within 250 of baseline
                if (drop_from_peak > 250 || rise_from_baseline < 250) {
                  ESP_LOGI("touch_monitor", "Button %d released. Value: %.0f, Peak: %.0f, Drop: %.0f, Rise: %.0f",
                           btn+1, value, peak_value[btn], drop_from_peak, rise_from_baseline);
                  button_pressed[btn] = false;
                  peak_value[btn] = 0;  // Reset peak
                  pressed_log_counter[btn] = 0;  // Reset counter

                  // Trigger the button release
                  if (btn == 0) id(button_1_state) = false;
                  else if (btn == 1) id(button_2_state) = false;
                  else if (btn == 2) id(button_3_state) = false;
                  else if (btn == 3) id(button_4_state) = false;
                }
              }

              // Update baseline when not pressed
              if (!button_pressed[btn]) {
                // Calculate difference from baseline
                float diff = fabs(value - baseline[btn]);

                // Adaptive learning rate based on how far we are from baseline
                float learning_rate;
                if (diff < 100) {
                  learning_rate = 0.01;
                } else if (diff < 500) {
                  learning_rate = 0.03;
                } else if (diff < 1000) {
                  learning_rate = 0.08;
                } else {
                  learning_rate = 0.15;
                }

                // Apply exponential moving average with adaptive rate
                baseline[btn] = baseline[btn] * (1.0 - learning_rate) + value * learning_rate;
              }

              // Update last value for next iteration
              last_value[btn] = value;
            }  // End of button loop

        - delay: 100ms  # Poll every 100ms
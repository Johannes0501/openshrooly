id: lighting_control_manager
mode: queued
then:
  - lambda: |-
      // Helper function to apply RGB settings
      auto apply_rgb_settings = [](float transition_ms = 0) {
        // Get RGB values as percentages (0-100)
        float r = id(color_r).state / 100.0f;
        float g = id(color_g).state / 100.0f;
        float b = id(color_b).state / 100.0f;

        // The max component determines brightness
        float maxc = std::max(r, std::max(g, b));

        auto rgb_call = id(rgb_led_strip).turn_on();
        if (maxc <= 0.0005f) {
          // All colors are 0, turn off
          rgb_call.set_brightness(0.0f);
        } else {
          // Set color ratios and use max as brightness
          rgb_call.set_rgb(r / maxc, g / maxc, b / maxc);
          rgb_call.set_brightness(maxc);
        }

        if (transition_ms > 0) {
          rgb_call.set_transition_length(transition_ms);
        }

        rgb_call.perform();

        return maxc;  // Return brightness for logging if needed
      };

      // Rest of the lambda code continues...
      // Use system's local time directly - it's already synced with NTP and has timezone applied
      struct tm timeinfo;
      time_t now;
      ::time(&now);  // Use global scope to avoid ambiguity with esphome::time namespace
      localtime_r(&now, &timeinfo);

      // Validate that system time is set (year > 2020)
      if (timeinfo.tm_year + 1900 < 2020) {
        ESP_LOGW("light_debug", "System time not yet synchronized");
        return;
      }

      const int local_min = timeinfo.tm_hour * 60 + timeinfo.tm_min;
      const int local_sec = timeinfo.tm_hour * 3600 + timeinfo.tm_min * 60 + timeinfo.tm_sec;

      // ---- window calc using LOCAL time ----
      const int sunrise_h = (int) id(sunrise_hour).state;
      const int start_min = sunrise_h * 60;
      const int duration_min = (int)(id(light_hours).state * 60);
      const int end_min = start_min + duration_min;

      // Debug logging - commented out now that timezone is working
      // static int debug_counter = 0;
      // if (++debug_counter >= 10) {  // Log every 10 executions to avoid spam
      //   ESP_LOGI("light_debug", "System time: %02d:%02d:%02d (min=%d)",
      //            timeinfo.tm_hour, timeinfo.tm_min, timeinfo.tm_sec, local_min);
      //   ESP_LOGI("light_debug", "Schedule: start_hour=%d, start_min=%d, duration_min=%d, end_min=%d",
      //            sunrise_h, start_min, duration_min, end_min);
      //   ESP_LOGI("light_debug", "Light hours raw value: %.2f", id(light_hours).state);
      //   debug_counter = 0;
      // }

      // Handle schedules that cross midnight
      bool in_win;
      if (end_min <= 1440) {
        // Schedule doesn't cross midnight
        in_win = (local_min >= start_min) && (local_min < end_min);
        // if (debug_counter == 0) {
        //   ESP_LOGI("light_debug", "No midnight cross: in_win=%s (local=%d >= start=%d && local < end=%d)",
        //            in_win ? "YES" : "NO", local_min, start_min, end_min);
        // }
      } else {
        // Schedule crosses midnight
        const int end_min_today = end_min % 1440;  // Time after midnight
        in_win = (local_min >= start_min) || (local_min < end_min_today);
        // if (debug_counter == 0) {
        //   ESP_LOGI("light_debug", "Crosses midnight: in_win=%s (local=%d >= start=%d OR local < end_today=%d)",
        //            in_win ? "YES" : "NO", local_min, start_min, end_min_today);
        // }
      }

      // ---- publish status every second with countdown ----

      auto format_duration = [](int total_seconds) {
          if (total_seconds < 60) {
              return str_sprintf("%ds", total_seconds);
          } else if (total_seconds < 3600) {
              int minutes = total_seconds / 60;
              int seconds = total_seconds % 60;
              return str_sprintf("%dm %ds", minutes, seconds);
          } else {
              int hours = total_seconds / 3600;
              int minutes = (total_seconds % 3600) / 60;
              int seconds = total_seconds % 60;
              return str_sprintf("%dh %dm %ds", hours, minutes, seconds);
          }
      };

      if (in_win) {
        // Calculate turn OFF time
        int off_hour = (end_min / 60) % 24;
        int off_minute = end_min % 60;
        id(lights_status).publish_state(str_sprintf("ON — turns OFF at %02d:%02d", off_hour, off_minute).c_str());
      } else {
        // Determine if lights turn on today or tomorrow
        if (end_min > 1440) {
          // Schedule crosses midnight
          int end_min_today = end_min % 1440;

          // Check if we're in the early morning part of yesterday's schedule
          if (local_min < end_min_today) {
            // We're in early morning, lights already turned on yesterday at start_min
            // They'll turn on again today at start_min
            id(lights_status).publish_state(str_sprintf("OFF — turns ON at %02d:%02d",
                                                       sunrise_h, 0).c_str());
          } else if (local_min < start_min) {
            // We're before today's start time - lights turn on today
            id(lights_status).publish_state(str_sprintf("OFF — turns ON at %02d:%02d",
                                                       sunrise_h, 0).c_str());
          } else {
            // We're after today's start time - lights turn on tomorrow
            id(lights_status).publish_state(str_sprintf("OFF — turns ON at %02d:%02d tomorrow",
                                                       sunrise_h, 0).c_str());
          }
        } else {
          // Normal schedule (doesn't cross midnight)
          if (local_min < start_min) {
            // Before start time today
            int on_hour = (start_min / 60) % 24;
            int on_minute = start_min % 60;
            id(lights_status).publish_state(str_sprintf("OFF — turns ON at %02d:%02d", on_hour, on_minute).c_str());
          } else {
            // After end time today, turns on tomorrow
            int on_hour = (start_min / 60) % 24;
            int on_minute = start_min % 60;
            id(lights_status).publish_state(str_sprintf("OFF — turns ON at %02d:%02d tomorrow", on_hour, on_minute).c_str());
          }
        }
      }

      // ---- edge detection & one-shot transitions + logging ----
      static bool prev_on = false;
      static int prev_sunrise_h = -1;
      static float prev_light_hours = -1;

      // Detect schedule changes
      bool schedule_changed = (sunrise_h != prev_sunrise_h) ||
                             (fabsf(id(light_hours).state - prev_light_hours) > 0.01);

      if (schedule_changed) {
        ESP_LOGI("shrooly", "Schedule changed: sunrise=%dh, duration=%.1fh, in_window=%s",
                 sunrise_h, id(light_hours).state, in_win ? "YES" : "NO");
        prev_sunrise_h = sunrise_h;
        prev_light_hours = id(light_hours).state;

        // When schedule changes, force evaluation regardless of prev_on state
        if (in_win) {
          ESP_LOGI("shrooly", "Schedule change puts us in window - turning lights ON");
          prev_on = true;
          id(lights_on_flag) = true;

          // Turn on lights with transition
          // White channel
          auto w_on = id(white_led).turn_on();
          w_on.set_brightness(id(white_intensity).state / 100.0f);
          w_on.set_transition_length(2000);  // Faster transition for manual changes
          w_on.perform();

          // RGB channel - use the helper function
          apply_rgb_settings(2000);  // 2 second transition

          ESP_LOGI("shrooly", "Lights ON (schedule change) — white=%.0f%%, rgb=(%d,%d,%d)",
                   id(white_intensity).state,
                   (int) id(color_r).state, (int) id(color_g).state, (int) id(color_b).state);
        } else if (!in_win) {
          ESP_LOGI("shrooly", "Schedule change puts us out of window - turning lights OFF");
          prev_on = false;
          id(lights_on_flag) = false;

          // Turn off lights
          auto w_off = id(white_led).turn_off();
          w_off.set_transition_length(2000);
          w_off.perform();

          auto rgb_off = id(rgb_led_strip).turn_off();
          rgb_off.set_transition_length(2000);
          rgb_off.perform();

          ESP_LOGI("shrooly", "Lights OFF (schedule change)");
        }
      } else if (in_win != prev_on) {
        // Normal time-based state change (not a schedule change)
        prev_on = in_win;
        id(lights_on_flag) = in_win;

        if (in_win) {
          // OFF -> ON : ramp white, set RGB target w/ derived brightness
          // White channel
          auto w_on = id(white_led).turn_on();
          w_on.set_brightness(id(white_intensity).state / 100.0f);
          w_on.set_transition_length(60000);
          w_on.perform();

          // RGB channel
          float r = id(color_r).state / 100.0f;
          float g = id(color_g).state / 100.0f;
          float b = id(color_b).state / 100.0f;
          float maxc = std::max(r, std::max(g, b));
          auto rgb_on = id(rgb_led_strip).turn_on();
          if (maxc <= 0.0005f) {
            // color is effectively black -> ensure LEDs stay off
            rgb_on.set_brightness(0.0f);
          } else {
            // normalize color to preserve hue, drive overall by brightness=maxc
            rgb_on.set_rgb(r / maxc, g / maxc, b / maxc);
            rgb_on.set_brightness(maxc);
          }
          rgb_on.set_transition_length(60000);
          rgb_on.perform();

          ESP_LOGI("shrooly", "Lights ON — white=%.0f%%, rgb=(%d,%d,%d)",
                   id(white_intensity).state,
                   (int) id(color_r).state, (int) id(color_g).state, (int) id(color_b).state);

        } else {
          // ON -> OFF : fade both once
          auto w_off = id(white_led).turn_off();
          w_off.set_transition_length(2000);
          w_off.perform();

          auto rgb_off = id(rgb_led_strip).turn_off();
          rgb_off.set_transition_length(2000);
          rgb_off.perform();

          ESP_LOGI("shrooly", "Lights OFF (fade 2s)");
        }
      }

      // ---- while ON: refresh levels (no transition), log ONLY on change ----
      if (in_win) {
        // White brightness refresh
        static float last_white = -1.0f;
        float white_now = id(white_intensity).state;
        if (fabsf(white_now - last_white) > 0.5f) {  // log & apply on meaningful change
          auto w_set = id(white_led).turn_on();
          w_set.set_brightness(white_now / 100.0f);
          w_set.perform();
          ESP_LOGI("shrooly", "White level -> %.0f%%", white_now);
          last_white = white_now;
        } else {
          auto w_set = id(white_led).turn_on();
          w_set.set_brightness(white_now / 100.0f);
          w_set.perform();
        }

        // RGB color refresh
        static int last_r = -1, last_g = -1, last_b = -1;
        int Ri = (int) id(color_r).state;
        int Gi = (int) id(color_g).state;
        int Bi = (int) id(color_b).state;

        // Use the helper function (no transition for real-time updates)
        apply_rgb_settings();

        if (Ri != last_r || Gi != last_g || Bi != last_b) {
          ESP_LOGI("shrooly", "RGB -> (%d,%d,%d)", Ri, Gi, Bi);
          last_r = Ri; last_g = Gi; last_b = Bi;
        }
      }
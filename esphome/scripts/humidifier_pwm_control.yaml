# ========================================================================
# HUMIDIFIER PWM CONTROL SCRIPT
# Implements 8Hz PWM control for the humidifier fan using I2C commands
# Duty cycle is based on the humidifier_speed setting (50-100%)
# ========================================================================

- id: humidifier_pwm_control
  mode: restart
  then:
  - lambda: |-
      ESP_LOGI("humidifier_pwm", "🔵 PWM control started - flag is ON");
  - while:
      condition:
        lambda: 'return id(humidifier_on_flag);'
      then:
        - lambda: |-
            // Get the speed setting (50-100%)
            float speed_percent = id(humidifier_speed).state;

            // Calculate on/off times for 8Hz (125ms period)
            int on_time_ms = (int)(125.0f * speed_percent / 100.0f);
            int off_time_ms = 125 - on_time_ms;

            // Turn on the humidifier fan via I2C using copro_bus
            id(copro_bus).execute(0x6C, 0x00, 0x01, 2, 0);
            if (id(copro_last_error)) {
              ESP_LOGW("humidifier_pwm", "❌ I2C write FAILED for humidifier ON");
            }

            // Keep on for the calculated duration
            id(humidifier_pwm_on_time) = on_time_ms;

        - delay: !lambda 'return id(humidifier_pwm_on_time);'

        - lambda: |-
            // Only turn off if we're doing PWM (not 100% duty)
            float speed_percent = id(humidifier_speed).state;
            if (speed_percent < 100.0f && id(humidifier_on_flag)) {
              // Turn off the humidifier fan via I2C using copro_bus
              id(copro_bus).execute(0x6C, 0x00, 0x00, 2, 0);
              if (id(copro_last_error)) {
                ESP_LOGW("humidifier_pwm", "❌ I2C write FAILED for humidifier OFF");
              }

              // Calculate off time
              int off_time_ms = 125 - (int)(125.0f * speed_percent / 100.0f);
              id(humidifier_pwm_off_time) = off_time_ms;
            } else {
              // If 100%, no off time
              id(humidifier_pwm_off_time) = 0;
            }

        - delay: !lambda 'return id(humidifier_pwm_off_time);'

  # When loop exits (humidifier_on_flag = false), ensure fan is OFF
  - lambda: |-
      // Always turn off when stopping
      ESP_LOGI("humidifier_pwm", "⚫ PWM control stopping - turning fan OFF");
      id(copro_bus).execute(0x6C, 0x00, 0x00, 2, 0);
      if (id(copro_last_error)) {
        ESP_LOGW("humidifier_pwm", "❌ I2C write FAILED for final OFF command");
      }
# ========================================================================
# LIGHT SETTINGS SCREEN
# Configure lighting schedule and intensity
# ========================================================================

- id: elightsettings
  bg_color: paper_white
  widgets:
    # Title
    - label:
        text: "Light Settings"
        align: TOP_MID
        y: 2
        text_font: font1

    # Sunrise hour setting
    - obj:
        id: light_sunrise_container
        x: 10
        y: 20
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "Sunrise:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: light_sunrise_value_label
              text: "--:00"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # Duration setting
    - obj:
        id: light_duration_container
        x: 10
        y: 37
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "Duration:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: light_duration_value_label
              text: "-- hrs"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # White intensity setting
    - obj:
        id: light_white_container
        x: 10
        y: 54
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "White:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: light_white_value_label
              text: "---- lux"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # RGB display
    - obj:
        id: light_rgb_container
        x: 10
        y: 71
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "RGB:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: light_rgb_value_label
              text: "R:-- G:-- B:--"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # Selection indicator
    - obj:
        id: light_selection_box
        x: 8
        y: 20
        width: 280
        height: 16
        border_width: 2
        border_color: paper_black
        bg_opa: 0%

    # Button Bar - Navigation buttons (20px tall, no borders)
    - obj:
        x: 0
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Back"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 75
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              id: light_btn2_label
              text: "-"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 150
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              id: light_btn3_label
              text: "+"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 225
        y: 107
        width: 71
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Next"
              align: CENTER
              text_color: paper_white
              text_font: font1
# ========================================================================
# SIMPLE LVGL DISPLAY CONFIGURATION
# Basic status display using LVGL for e-paper
# ========================================================================

# Define inverted colors for e-paper
color:
  - id: paper_white  # Shows as white on e-paper (actually black in memory)
    hex: "000000"
  - id: paper_black  # Shows as black on e-paper (actually white in memory)
    hex: "FFFFFF"

# LVGL Configuration (native component in ESPHome 2024.8.0+)
lvgl:
  displays:
    - my_display

  # Buffer settings - reduced to save memory
  buffer_size: 25%

  # Background color (use black which appears white on inverted display)
  bg_color: paper_white

  # Theme for inverted e-paper
  theme:
    label:
      text_color: paper_black  # White in memory, shows as black on screen

  # Log level for debugging
  log_level: INFO

  # Single main page - no boot page needed
  pages:
    - id: main_page
      bg_color: paper_white  # Black in memory, white on screen
      widgets:
        # Title
        - label:
            text: "OpenShrooly v0.4.3"
            align: TOP_MID
            y: 5

        # Temperature
        - label:
            id: temp_label
            text: "Temp: --.-°C"
            align: TOP_LEFT
            x: 10
            y: 30

        # Humidity
        - label:
            id: humidity_label
            text: "Humidity: --.-%"
            align: TOP_LEFT
            x: 10
            y: 50

        # Fan status
        - label:
            id: fan_label
            text: "Fan: OFF"
            align: TOP_LEFT
            x: 10
            y: 70

        # Humidifier status
        - label:
            id: humidifier_label
            text: "Humidifier: OFF"
            align: TOP_LEFT
            x: 10
            y: 90

        # Light status
        - label:
            id: light_label
            text: "Light: OFF"
            align: TOP_LEFT
            x: 150
            y: 30

        # WiFi status
        - label:
            id: wifi_label
            text: "WiFi: Disconnected"
            align: TOP_LEFT
            x: 150
            y: 50

        # Time
        - label:
            id: time_label
            text: "00:00"
            align: TOP_RIGHT
            x: -10
            y: 5

        # Alert indicator (bottom of screen)
        - label:
            id: alert_label
            text: "No Alerts"
            align: BOTTOM_MID
            y: -5
            text_color: paper_black
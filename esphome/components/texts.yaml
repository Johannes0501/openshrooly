# ========================================================================
# TEXT COMPONENTS
# Runtime-editable text fields stored in flash
# ========================================================================

text:
  - platform: template
    id: device_name
    name: "Device Name"
    icon: mdi:tag-text-outline
    entity_category: config
    optimistic: true
    restore_value: true
    mode: text
    min_length: 0
    max_length: 32
    initial_value: ""
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 1
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("device_name", "Device name updated to '%s'", x.c_str());

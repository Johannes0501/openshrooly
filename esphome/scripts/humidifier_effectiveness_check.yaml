# ========================================================================
# HUMIDIFIER EFFECTIVENESS ONE-TIME CHECK SCRIPT
# Checks humidity increase exactly 2 minutes after being called
# ========================================================================

id: humidifier_effectiveness_check
mode: restart
then:
  - lambda: |-
      // Save current humidity as start value before delay
      id(humidifier_start_humidity) = id(humidity).state;
  - delay: 2min
  - lambda: |-
      if (id(humidifier_on_flag)) {
        float current_humidity = id(humidity).state;
        float start_humidity = id(humidifier_start_humidity);
        float humidity_increase = current_humidity - start_humidity;

        // Warning if humidity hasn't risen at all or has decreased
        if (humidity_increase <= 0.0f) {
          ESP_LOGW("humidifier_monitor",
                   "⚠️  Humidifier ON for 2 minutes but humidity unchanged: %.1f%% → %.1f%% (change: %+.1f%%)",
                   start_humidity, current_humidity, humidity_increase);
          // Set alert flag
          id(humidity_not_rising_flag) = true;
          // Beep for warning
          id(alert_beep_warning).execute();
        }
        // Info log for small increases that might indicate slow operation
        else if (humidity_increase < 1.0f) {
          ESP_LOGI("humidifier_monitor",
                   "ℹ️  Humidifier working slowly: %.1f%% → %.1f%% over 2 minutes (+%.1f%%)",
                   start_humidity, current_humidity, humidity_increase);
          // Clear alert flag if humidity is rising even slowly
          id(humidity_not_rising_flag) = false;
        } else {
          // Clear alert flag if humidity is rising well
          id(humidity_not_rising_flag) = false;
        }
      }
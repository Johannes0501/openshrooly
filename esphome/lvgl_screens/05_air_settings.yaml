# ========================================================================
# AIR EXCHANGE SETTINGS SCREEN
# Configure fan cycles and speed
# ========================================================================

- id: fairsettings
  bg_color: paper_white
  widgets:
    # Title
    - label:
        text: "Air Exchange Settings"
        align: TOP_MID
        y: 2
        text_font: font1

    # Current fan status
    - label:
        id: air_status_label
        text: "Fan: OFF (--- RPM)"
        align: TOP_LEFT
        x: 10
        y: 20
        text_font: font1

    # Period setting
    - obj:
        id: air_period_container
        x: 10
        y: 37
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "Period:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: air_period_value_label
              text: "-- min"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # Run duration setting
    - obj:
        id: air_duration_container
        x: 10
        y: 54
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "Run:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: air_duration_value_label
              text: "-- sec"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # Fan speed setting
    - obj:
        id: air_speed_container
        x: 10
        y: 71
        width: 276
        height: 16
        bg_color: paper_white
        widgets:
          - label:
              text: "Speed:"
              align: LEFT_MID
              x: 0
              text_font: font1
          - label:
              id: air_speed_value_label
              text: "---%"
              align: RIGHT_MID
              x: -10
              text_font: font1

    # Selection indicator
    - obj:
        id: air_selection_box
        x: 8
        y: 37
        width: 280
        height: 16
        border_width: 2
        border_color: paper_black
        bg_opa: 0%

    # Button Bar - Navigation buttons (20px tall, no borders)
    - obj:
        x: 0
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Back"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 75
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              id: air_btn2_label
              text: "-"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 150
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              id: air_btn3_label
              text: "+"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 225
        y: 107
        width: 71
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Next"
              align: CENTER
              text_color: paper_white
              text_font: font1
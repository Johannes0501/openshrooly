name: PR Preview Dispatch

on:
  issue_comment:
    types:
      - created

jobs:
  dispatch-preview:
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/preview')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      actions: write
    steps:
      - name: Trigger preview build
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commentAuthor = context.payload.comment.user.login;
            const issueNumber = context.payload.issue.number;

            // Ensure commenter has at least write permission
            const perm = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: commentAuthor,
            }).catch(() => null);

            const level = perm?.data?.permission ?? 'none';
            if (!['admin', 'maintain', 'write'].includes(level)) {
              core.setFailed(`${commentAuthor} lacks permission to request preview builds (has "${level}")`);
              return;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: issueNumber });
            const headRef = pr.data.head.ref;
            const headSha = pr.data.head.sha;

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'dev-release.yml',
              ref: headRef,
              inputs: {
                publish_dev_outputs: 'false',
                publish_release: 'false',
              },
            });

            const message = `Preview build triggered for \`${headRef}\` (@ ${headSha.slice(0,7)}). Track progress in the **Build development firmware** workflow run list.`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: message,
            });

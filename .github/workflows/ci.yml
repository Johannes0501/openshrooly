name: Firmware CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  esphome-checks:
    name: ESPHome Configuration & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('esphome/**/*.yaml', 'external_components/**/*.py', 'external_components/**/*.cpp', 'webapp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/esphome
          key: ${{ runner.os }}-platformio-${{ hashFiles('esphome/**/*.yaml', 'external_components/**/*.py', 'external_components/**/*.cpp', 'webapp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.9.0,<2025.10.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Determine build ID
        id: build_id
        run: |
          SHA="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"  # head SHA for PRs
          fi
          BUILD_ID="${SHA:0:12}"
          echo "Using build id: ${BUILD_ID}"
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Build web UI
        env:
          NEXT_BUILD_ID: ${{ steps.build_id.outputs.build_id }}
        run: |
          cd webapp
          npm ci
          node -v
          npm -v
          echo "NEXT_BUILD_ID=$NEXT_BUILD_ID"
          npm run build

      - name: Embed static assets
        run: |
          cd esphome
          python3 external_components/web_server/embed_static_files.py ../webapp/out external_components/web_server/static_files.h external_components/web_server/static_files.cpp

      - name: Flag embedded asset drift
        run: |
          if ! git diff --quiet -- esphome/external_components/web_server/static_files.h esphome/external_components/web_server/static_files.cpp; then
            echo "::warning::Embedded static files differ from repository state. If this persists locally, rerun the embed script and commit the results."
            git --no-pager diff --stat -- esphome/external_components/web_server/static_files.h esphome/external_components/web_server/static_files.cpp
            git --no-pager diff -U3 -- esphome/external_components/web_server/static_files.h esphome/external_components/web_server/static_files.cpp | head -n 200
            git status --short esphome/external_components/web_server/static_files.h esphome/external_components/web_server/static_files.cpp
          fi

      - name: Validate configuration
        run: esphome config esphome/openshrooly.yaml

      - name: Compile firmware
        run: esphome compile esphome/openshrooly.yaml

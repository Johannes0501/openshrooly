# ========================================================================
# TIMEZONE CONFIGURATION WITH AUTOMATIC DST HANDLING
# Uses IANA timezone database strings for proper DST transitions
# ========================================================================

select:
  - platform: template
    id: timezone_select
    name: "Timezone"
    icon: mdi:map-clock-outline
    entity_category: config
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 1
    options:
      # North America
      - "America/Los_Angeles"      # Pacific Time (PST/PDT)
      - "America/Denver"           # Mountain Time (MST/MDT)
      - "America/Phoenix"          # Arizona (MST no DST)
      - "America/Chicago"          # Central Time (CST/CDT)
      - "America/New_York"         # Eastern Time (EST/EDT)
      - "America/Toronto"          # Eastern Time (EST/EDT)
      - "America/Mexico_City"      # Central Time Mexico
      - "America/Vancouver"        # Pacific Time Canada
      - "America/Edmonton"         # Mountain Time Canada
      - "America/Winnipeg"         # Central Time Canada
      - "America/Halifax"          # Atlantic Time
      - "America/St_Johns"         # Newfoundland Time

      # Central/South America
      - "America/Sao_Paulo"        # Brazil Time
      - "America/Buenos_Aires"     # Argentina Time
      - "America/Santiago"         # Chile Time
      - "America/Bogota"           # Colombia Time
      - "America/Lima"             # Peru Time
      - "America/Caracas"          # Venezuela Time

      # Europe
      - "Europe/London"            # GMT/BST
      - "Europe/Dublin"            # GMT/IST
      - "Europe/Lisbon"            # WET/WEST
      - "Europe/Paris"             # CET/CEST
      - "Europe/Berlin"            # CET/CEST
      - "Europe/Amsterdam"         # CET/CEST
      - "Europe/Brussels"          # CET/CEST
      - "Europe/Rome"              # CET/CEST
      - "Europe/Madrid"            # CET/CEST
      - "Europe/Warsaw"            # CET/CEST
      - "Europe/Stockholm"         # CET/CEST
      - "Europe/Oslo"              # CET/CEST
      - "Europe/Athens"            # EET/EEST
      - "Europe/Helsinki"          # EET/EEST
      - "Europe/Istanbul"          # Turkey Time
      - "Europe/Moscow"            # Moscow Time
      - "Europe/Kiev"              # EET/EEST

      # Middle East & Africa
      - "Asia/Jerusalem"           # Israel Time
      - "Asia/Dubai"               # Gulf Standard Time
      - "Asia/Riyadh"              # Arabia Standard Time
      - "Asia/Tehran"              # Iran Time
      - "Africa/Cairo"             # Egypt Time
      - "Africa/Johannesburg"      # South Africa Time
      - "Africa/Lagos"             # West Africa Time
      - "Africa/Nairobi"           # East Africa Time

      # Asia
      - "Asia/Karachi"             # Pakistan Time
      - "Asia/Kolkata"             # India Time
      - "Asia/Dhaka"               # Bangladesh Time
      - "Asia/Bangkok"             # Indochina Time
      - "Asia/Jakarta"             # Western Indonesia Time
      - "Asia/Singapore"           # Singapore Time
      - "Asia/Kuala_Lumpur"        # Malaysia Time
      - "Asia/Manila"              # Philippines Time
      - "Asia/Hong_Kong"           # Hong Kong Time
      - "Asia/Shanghai"            # China Time
      - "Asia/Taipei"              # Taiwan Time
      - "Asia/Seoul"               # Korea Time
      - "Asia/Tokyo"               # Japan Time

      # Oceania
      - "Australia/Perth"          # Western Australia
      - "Australia/Adelaide"       # Central Australia (CST/CDT)
      - "Australia/Darwin"         # Central Australia (no DST)
      - "Australia/Brisbane"       # Eastern Australia (no DST)
      - "Australia/Sydney"         # Eastern Australia (EST/EDT)
      - "Australia/Melbourne"      # Eastern Australia (EST/EDT)
      - "Pacific/Auckland"         # New Zealand Time
      - "Pacific/Fiji"             # Fiji Time
      - "Pacific/Honolulu"         # Hawaii Time

    initial_option: "America/New_York"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: |-
            // Set the timezone directly using the IANA timezone string
            std::string tz = x;
            id(sntp_time).set_timezone(tz.c_str());
            ESP_LOGI("timezone", "Set timezone to %s (automatic DST handling)", tz.c_str());
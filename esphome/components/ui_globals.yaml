# ========================================================================
# UI GLOBALS CONFIGURATION
# Global variables for UI state management
# ========================================================================

globals:
  # Current UI page/screen
  - id: current_ui_page
    type: int
    initial_value: '0'  # 0 = main page

  # Last button press time (for debouncing)
  - id: last_button_press_time
    type: unsigned long
    initial_value: '0'

  # UI update flags
  - id: ui_needs_update
    type: bool
    initial_value: 'true'
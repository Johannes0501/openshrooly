# ========================================================================
# TIMEZONE OFFSET CONFIGURATION
# Allows users to set their local time offset from UTC
# ========================================================================

number:
  - platform: template
    id: timezone_offset_hours
    name: "Timezone Offset (hours from UTC)"
    min_value: -12
    max_value: 14
    step: 0.5
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 0
    entity_category: config
    icon: mdi:clock-time-eight-outline
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 3

# Helper template sensor to show local time
text_sensor:
  - platform: template
    id: local_time_display
    name: "Local Time"
    icon: mdi:clock-outline
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 2
    lambda: |-
      auto utc = id(sntp_time).now();
      if (!utc.is_valid()) return {"Time not synced"};

      // Apply offset
      float offset_hours = id(timezone_offset_hours).state;
      int offset_seconds = offset_hours * 3600;
      time_t local_timestamp = utc.timestamp + offset_seconds;

      // Convert back to time structure
      struct tm local_tm;
      localtime_r(&local_timestamp, &local_tm);

      char buffer[32];
      strftime(buffer, sizeof(buffer), "%H:%M (%Y-%m-%d)", &local_tm);
      return {buffer};
    update_interval: 10s

# Modified sunrise calculation using offset
script:
  - id: calculate_local_sunrise
    then:
      - lambda: |-
          // Get sunrise hour in UTC
          int sunrise_utc = id(sunrise_hour).state;

          // Apply timezone offset
          float offset = id(timezone_offset_hours).state;
          int local_sunrise = sunrise_utc - (int)offset;

          // Wrap around 24 hours
          while (local_sunrise < 0) local_sunrise += 24;
          while (local_sunrise >= 24) local_sunrise -= 24;

          ESP_LOGI("timezone", "Sunrise: %02d:00 UTC = %02d:00 local (offset %.1f)",
                   sunrise_utc, local_sunrise, offset);
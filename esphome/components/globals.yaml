
globals:
  - id: menu_selection
    type: int
    restore_value: no
    initial_value: '0'

  - id: humidity_selection
    type: int
    restore_value: no
    initial_value: '0'

  - id: edit_mode
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: page_just_changed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: lights_on_flag
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: air_exchange_on_flag
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: air_exchange_next_on_ts
    type: int
    restore_value: no
    initial_value: '0'

  - id: air_exchange_next_off_ts
    type: int
    restore_value: no
    initial_value: '0'

  - id: humidifier_on_flag
    type: bool
    restore_value: yes
    initial_value: 'false'

  # Humidifier monitoring variables
  - id: humidifier_start_humidity
    type: float
    restore_value: no
    initial_value: '0'

  # Water level calibration values (persist across reboots)
  # Updated default values from your current dry measurements
  - id: water_cal_s0_dry
    type: uint32_t
    restore_value: yes
    initial_value: '42000'  # Average of recent dry readings

  - id: water_cal_s1_dry
    type: uint32_t
    restore_value: yes
    initial_value: '39470'

  - id: water_cal_s2_dry
    type: uint32_t
    restore_value: yes
    initial_value: '38470'

  - id: water_cal_s3_dry
    type: uint32_t
    restore_value: yes
    initial_value: '37395'

  - id: is_calibrated
    type: bool
    restore_value: yes
    initial_value: 'false'  # Keep uncalibrated UI behavior

  # Calibration state
  - id: calibration_step
    type: int
    restore_value: no
    initial_value: '0'

  # Variables for humidifier PWM control
  - id: humidifier_pwm_on_time
    type: int
    restore_value: no
    initial_value: '750'

  - id: humidifier_pwm_off_time
    type: int
    restore_value: no
    initial_value: '250'

  # Alert tracking globals
  - id: active_alert_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: i2c_failure_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: fan_spinup_failure
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: humidity_not_rising_flag
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_sht41_reading_time
    type: unsigned long
    initial_value: '0'

  # UI globals
  - id: current_ui_page
    type: int
    initial_value: '0'

  - id: last_button_press_time
    type: unsigned long
    initial_value: '0'

  - id: ui_needs_update
    type: bool
    initial_value: 'true'

  # Button state globals for touch monitoring
  - id: button_1_state
    type: bool
    initial_value: 'false'

  - id: button_2_state
    type: bool
    initial_value: 'false'

  - id: button_3_state
    type: bool
    initial_value: 'false'

  - id: button_4_state
    type: bool
    initial_value: 'false'

  # Historical data logging (RAM only, not saved to flash)
  # Circular buffer for 24 hours of data at 30-second intervals (2880 points)
  - id: history_index
    type: int
    restore_value: no
    initial_value: '0'

  - id: history_count
    type: int
    restore_value: no
    initial_value: '0'

  # Store timestamps (Unix epoch time)
  - id: history_timestamps
    type: std::vector<uint32_t>
    restore_value: no

  # Store temperature values
  - id: history_temperature
    type: std::vector<float>
    restore_value: no

  # Store humidity values
  - id: history_humidity
    type: std::vector<float>
    restore_value: no

  # Store device states (bit flags: bit 0=lights, bit 1=humidifier, bit 2=air_exchange)
  - id: history_device_states
    type: std::vector<uint8_t>
    restore_value: no

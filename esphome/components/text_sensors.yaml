# ========================================================================
# TEXT SENSORS
# Status display sensors for the web interface
# ========================================================================

text_sensor:
  # =======================================================================
  # Status Display Sensors
  # These are marked as internal: true to prevent them from syncing to
  # Home Assistant. They are only used for displaying status information
  # in the local web interface. Home Assistant should use the actual
  # sensor values and controls directly rather than these formatted
  # status strings.
  # =======================================================================

  - platform: template
    id: air_exchange_status
    name: "Air Exchange Status"
    internal: true  # Prevents sync to Home Assistant
    icon: mdi:fan-auto
    web_server:
      sorting_group_id: grp_air
      sorting_weight: 1

  - platform: template
    id: lights_status
    name: "Light Status"
    internal: true  # Prevents sync to Home Assistant
    icon: mdi:lightbulb-on-outline
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 1

  - platform: template
    id: humidifier_fan_status
    name: "Humidifier Status"
    internal: true  # Prevents sync to Home Assistant
    icon: mdi:air-humidifier
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 1

  # Calibration status display
  - platform: template
    name: "Calibration Status"
    id: calibration_status
    internal: true  # Prevents sync to Home Assistant
    icon: mdi:information-outline
    update_interval: 1s
    web_server:
      sorting_group_id: grp_calibration
      sorting_weight: 1
    lambda: |-
      if (!id(is_calibrated)) {
        return {"Not calibrated - using auto mode"};
      } else if (id(calibration_step) == 1) {
        return {"⚠️ Confirm tank is empty"};
      } else {
        return {"✅ Calibrated"};
      }

  # WiFi network mode and info
  - platform: template
    name: "WiFi Mode"
    id: wifi_mode
    icon: mdi:wifi
    update_interval: 5s
    lambda: |-
      if (WiFi.isConnected()) {
        return {"Station"};
      } else {
        return {"Access Point"};
      }

  - platform: template
    name: "WiFi SSID"
    id: wifi_ssid
    icon: mdi:wifi-marker
    update_interval: 5s
    lambda: |-
      if (WiFi.isConnected()) {
        return {WiFi.SSID().c_str()};
      } else {
        return {"OpenShrooly"};
      }

  - platform: template
    name: "IP Address"
    id: ip_address
    icon: mdi:ip-network
    update_interval: 5s
    lambda: |-
      if (WiFi.isConnected()) {
        return {WiFi.localIP().toString().c_str()};
      } else {
        return {"192.168.4.1"};
      }
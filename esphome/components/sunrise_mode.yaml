# ========================================================================
# SUNRISE MODE SELECTION
# Let users choose between UTC time or "Hours after midnight" mode
# The latter works universally without timezone configuration
# ========================================================================

select:
  - platform: template
    id: sunrise_mode
    name: "Sunrise Time Mode"
    options:
      - "Hours after local midnight"
      - "UTC time (requires offset)"
    initial_option: "Hours after local midnight"
    optimistic: true
    restore_value: true
    entity_category: config
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 1

number:
  # Renamed version that's clearer for users
  - platform: template
    id: sunrise_delay
    name: "Lights ON (hours after midnight)"
    min_value: 0
    max_value: 23
    step: 0.5
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 6  # 6 AM local time
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 4

text_sensor:
  - platform: template
    id: sunrise_explanation
    name: "Sunrise Setting Info"
    lambda: |-
      if (id(sunrise_mode).state == "Hours after local midnight") {
        float hours = id(sunrise_delay).state;
        int h = (int)hours;
        int m = (hours - h) * 60;
        return str_sprintf("Lights will turn ON %d:%02d after midnight (device time)", h, m);
      } else {
        return {"Using UTC time - configure timezone offset"};
      }
    update_interval: 5s
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 2
# ========================================================================
# WATER LEVEL CALIBRATION SYSTEM
# Calibration buttons for water level sensors
# Note: Globals are defined in components/globals.yaml
# ========================================================================

button:
  # Simple dry calibration button
  - platform: template
    name: "Calibrate Dry Tank"
    icon: mdi:water-sync
    id: water_calibration_button
    web_server:
      sorting_group_id: grp_calibration
      sorting_weight: 10
    on_press:
      - lambda: |-
          if (id(calibration_step) == 0) {
            ESP_LOGW("calibration", "⚠️ DRY TANK CALIBRATION");
            ESP_LOGW("calibration", "⚠️ ENSURE WATER TANK IS COMPLETELY EMPTY!");
            ESP_LOGW("calibration", "⚠️ Press button again to confirm and calibrate");
            id(calibration_step) = 1;
          } else if (id(calibration_step) == 1) {
            // Read all 4 sensors in dry state
            auto device = new i2c::I2CDevice();
            device->set_i2c_bus(id(bus_a));
            device->set_i2c_address(0x6C);

            uint8_t data[4];
            uint8_t regs[] = {0x03, 0x07, 0x0B, 0x0F};
            uint32_t dry_values[4];
            bool success = true;

            for (int i = 0; i < 4; i++) {
              if (!device->read_register(regs[i], data, 4)) {
                dry_values[i] = (uint32_t)data[0] | ((uint32_t)data[1] << 8) |
                               ((uint32_t)data[2] << 16) | ((uint32_t)data[3] << 24);
              } else {
                success = false;
                break;
              }
            }

            if (success) {
              id(water_cal_s0_dry) = dry_values[0];
              id(water_cal_s1_dry) = dry_values[1];
              id(water_cal_s2_dry) = dry_values[2];
              id(water_cal_s3_dry) = dry_values[3];

              ESP_LOGI("calibration", "✅ DRY CALIBRATION COMPLETE!");
              ESP_LOGI("calibration", "Dry values - S0:%u, S1:%u, S2:%u, S3:%u",
                       dry_values[0], dry_values[1], dry_values[2], dry_values[3]);
              id(is_calibrated) = true;
              id(calibration_step) = 0;
            } else {
              ESP_LOGE("calibration", "Failed to read sensors!");
            }

            delete device;
          }

  # Cancel calibration button
  - platform: template
    name: "Cancel Calibration"
    icon: mdi:cancel
    id: cancel_calibration_button
    web_server:
      sorting_group_id: grp_calibration
      sorting_weight: 20
    on_press:
      - lambda: |-
          if (id(calibration_step) > 0) {
            ESP_LOGW("calibration", "Calibration cancelled");
            id(calibration_step) = 0;
          }

  # Reset calibration to defaults
  - platform: template
    name: "Reset Water Calibration"
    icon: mdi:restore
    web_server:
      sorting_group_id: grp_calibration
      sorting_weight: 30
    on_press:
      - lambda: |-
          // Reset to uncalibrated state
          id(water_cal_s0_dry) = 0;
          id(water_cal_s1_dry) = 0;
          id(water_cal_s2_dry) = 0;
          id(water_cal_s3_dry) = 0;
          id(is_calibrated) = false;
          id(calibration_step) = 0;
          ESP_LOGW("calibration", "Calibration reset - using differential mode");


# ========================================================================
# TEXT SENSORS
# Status display sensors for the web interface
# ========================================================================

text_sensor:
  - platform: template
    id: air_exchange_status
    name: "Air Exchange Status"
    icon: mdi:fan-auto
    web_server:
      sorting_group_id: grp_air
      sorting_weight: 1

  - platform: template
    id: lights_status
    name: "Lights Status"
    icon: mdi:lightbulb-on-outline
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 1

  - platform: template
    id: humidifier_fan_status
    name: "Humidifier Status"
    icon: mdi:air-humidifier
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 1

  # Calibration status display (moved from calibration.yaml)
  - platform: template
    name: "Calibration Status"
    id: calibration_status
    icon: mdi:information-outline
    update_interval: 1s
    web_server:
      sorting_group_id: grp_calibration
      sorting_weight: 1
    lambda: |-
      if (!id(is_calibrated)) {
        return {"Not calibrated - using auto mode"};
      } else if (id(calibration_step) == 1) {
        return {"⚠️ Confirm tank is empty"};
      } else {
        return {"✅ Calibrated"};
      }
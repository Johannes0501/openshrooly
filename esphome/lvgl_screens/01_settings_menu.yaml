# ========================================================================
# SETTINGS MENU - Main settings navigation screen
# Scrollable list of configuration options
# ========================================================================

- id: bsettingsmenu
  bg_color: paper_white
  widgets:
    # Title
    - label:
        text: "Settings Menu"
        align: TOP_MID
        y: 2
        text_font: font1

    # Menu items list (simple labels for now, will add selection later)
    - label:
        id: menu_temp_item
        text: "> Temperature"
        align: TOP_LEFT
        x: 10
        y: 20
        text_font: font1

    - label:
        id: menu_humidity_item
        text: "  Humidity"
        align: TOP_LEFT
        x: 10
        y: 32
        text_font: font1

    - label:
        id: menu_light_item
        text: "  Light"
        align: TOP_LEFT
        x: 10
        y: 44
        text_font: font1

    - label:
        id: menu_air_item
        text: "  Air Exchange"
        align: TOP_LEFT
        x: 10
        y: 56
        text_font: font1

    - label:
        id: menu_system_item
        text: "  System Info"
        align: TOP_LEFT
        x: 10
        y: 68
        text_font: font1

    # Button Bar - Navigation buttons (20px tall)
    - obj:
        x: 0
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Back"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 75
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Up"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 150
        y: 107
        width: 73
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Down"
              align: CENTER
              text_color: paper_white
              text_font: font1

    - obj:
        x: 225
        y: 107
        width: 71
        height: 20
        bg_color: paper_black
        widgets:
          - label:
              text: "Select"
              align: CENTER
              text_color: paper_white
              text_font: font1
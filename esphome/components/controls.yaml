# These are all the controls that are visible to the UI

number:
  - platform: template
    id: target_humidity
    name: "Target Humidity"
    unit_of_measurement: "%"
    device_class: humidity
    icon: mdi:water-percent
    min_value: 30
    max_value: 100
    step: 0.5
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 70
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 10

    set_action:
      - script.execute: humidity_control_manager

  - platform: template
    id: humidifier_speed
    name: "Humidifier: Speed"
    unit_of_measurement: "%"
    icon: mdi:fan
    min_value: 50  # Minimum 50% for effective misting
    max_value: 100
    step: 5
    mode: slider
    optimistic: true
    restore_value: true
    initial_value: 75
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 20

    set_action:
      - script.execute: humidity_control_manager


  # Temperature control thresholds
  - platform: template
    id: temp_min_threshold
    name: "Temperature: Minimum"
    unit_of_measurement: "°C"
    device_class: temperature
    icon: mdi:thermometer-low
    min_value: 10
    max_value: 25
    step: 0.5
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 18
    web_server:
      sorting_group_id: grp_temperature
      sorting_weight: 10
    on_value:
      - lambda: |-
          // Validate min is less than max
          if (x >= id(temp_max_threshold).state) {
            ESP_LOGW("temp_control", "⚠️ Min temp (%.1f°C) must be less than max temp (%.1f°C)",
                     x, id(temp_max_threshold).state);
          }

  - platform: template
    id: temp_max_threshold
    name: "Temperature: Maximum"
    unit_of_measurement: "°C"
    device_class: temperature
    icon: mdi:thermometer-high
    min_value: 20
    max_value: 35
    step: 0.5
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 28
    web_server:
      sorting_group_id: grp_temperature
      sorting_weight: 20
    on_value:
      - lambda: |-
          // Validate max is greater than min
          if (x <= id(temp_min_threshold).state) {
            ESP_LOGW("temp_control", "⚠️ Max temp (%.1f°C) must be greater than min temp (%.1f°C)",
                     x, id(temp_min_threshold).state);
          }

  - platform: template
    id: air_exchange_period_min
    name: "Air Exchange: Period (min)"
    icon: mdi:clock-outline
    min_value: 1
    max_value: 240
    step: 1
    web_server:
      sorting_group_id: grp_air
      sorting_weight: 5
    optimistic: true
    restore_value: true
    initial_value: 15
    on_value:
      - lambda: |-
          // Check if settings provide at least 60 seconds of downtime
          float period_sec = x * 60.0f;
          float run_sec = id(air_exchange_run_sec).state;
          float downtime_sec = period_sec - run_sec;

          if (downtime_sec < 60.0f) {
            ESP_LOGW("air_exchange", "⚠️ WARNING: Current settings only provide %.0f seconds of downtime between fan cycles. Consider increasing period or decreasing run duration for at least 60 seconds of downtime.", downtime_sec);
          }
      - script.execute: air_exchange_manager

  - platform: template
    id: air_exchange_run_sec
    name: "Air Exchange: Run Duration (s)"
    icon: mdi:timer-outline
    min_value: 5
    max_value: 900
    step: 5
    web_server:
      sorting_group_id: grp_air
      sorting_weight: 15
    optimistic: true
    restore_value: true
    initial_value: 30
    on_value:
      - lambda: |-
          // Check if settings provide at least 60 seconds of downtime
          float period_sec = id(air_exchange_period_min).state * 60.0f;
          float run_sec = x;
          float downtime_sec = period_sec - run_sec;

          if (downtime_sec < 60.0f) {
            ESP_LOGW("air_exchange", "⚠️ WARNING: Current settings only provide %.0f seconds of downtime between fan cycles. Consider increasing period or decreasing run duration for at least 60 seconds of downtime.", downtime_sec);
          }
      - script.execute: air_exchange_manager

  - platform: template
    id: air_exchange_speed
    name: "Air Exchange: Speed"
    unit_of_measurement: "%"
    icon: mdi:fan
    min_value: 15  # Minimum 15% to ensure proper airflow
    max_value: 100
    step: 5
    web_server:
      sorting_group_id: grp_air
      sorting_weight: 25
    optimistic: true
    restore_value: true
    initial_value: 30
    on_value:
      - script.execute: air_exchange_manager

  - platform: template
    id: sunrise_hour
    name: "Lights: Sunrise Hour"
    min_value: 0
    max_value: 23
    step: 1
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 5
    optimistic: true
    restore_value: true
    initial_value: 8
    unit_of_measurement: ":00"
    entity_category: config
    icon: mdi:weather-sunset-up
    set_action:
      - script.execute: lighting_control_manager

  - platform: template
    id: light_hours
    name: "Lights: Duration (Hours)"
    icon: mdi:clock-time-eight
    min_value: 0
    max_value: 24
    step: 0.25
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 15
    optimistic: true
    restore_value: true
    initial_value: 12
    set_action:
      - script.execute: lighting_control_manager

  - platform: template
    id: white_intensity
    name: "White LED Intensity"
    unit_of_measurement: "lux"
    icon: mdi:lightbulb-outline
    min_value: 0
    max_value: 4000
    step: 5
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 25
    optimistic: true
    restore_value: true
    initial_value: 150  # ~17% brightness - gentle light for pinning
    set_action:
      - script.execute: lighting_control_manager

  - platform: template
    id: color_r
    name: "RED LED Intensity"
    icon: mdi:palette
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 35    
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - script.execute: lighting_control_manager

  - platform: template
    id: color_g
    name: "Green LED Intensity"
    icon: mdi:palette
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    optimistic: true
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 45    
    restore_value: true
    initial_value: 0
    set_action:
      - script.execute: lighting_control_manager

  - platform: template
    id: color_b
    name: "Blue LED Intensity"
    icon: mdi:palette
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 55    
    optimistic: true
    restore_value: true
    initial_value: 100
    set_action:
      - script.execute: lighting_control_manager


# Human readable text sensors

text_sensor:
  - platform: template
    id: humidifier_fan_status
    name: "Humidifier Fan Status"
    icon: mdi:air-humidifier
    internal: true
    web_server:
      sorting_group_id: grp_humidity
      sorting_weight: 1   


# ========================================================================
# BUTTONS CONFIGURATION
# Physical and touch button inputs with actions
# ========================================================================

# Touch sensor configuration
esp32_touch:
  measurement_duration: 0.13ms

# Button sensors
binary_sensor:
  # Physical reset button
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    name: "Reset button"
    icon: mdi:restart
    web_server:
      sorting_group_id: grp_hidden
    on_click:
      # Long press (5-60 seconds) triggers factory reset
      - min_length: 5s
        max_length: 60s
        then:
          - rtttl.play: "beep:d=4,o=5,b=120:16a"
          - lambda: |-

              id(my_display).fill(COLOR_OFF);
              id(my_display).print(30, 60, id(font1), "Factory Reset...");
              id(my_display).print(30, 80, id(font1), "Please wait...");
              id(my_display).update();
          - delay: 2s
          - switch.turn_on: do_factory_reset

  # Touch button 1
  - platform: esp32_touch
    name: "Button 1"
    icon: mdi:numeric-1-circle
    id: button_1
    pin: GPIO10
    web_server:
      sorting_group_id: grp_extras
    threshold: 10000
    on_press:
      then:
        - rtttl.play: "btn1:d=8,o=5,b=200:c"

    filters:
      - delayed_on: 5ms
      - delayed_off: 10ms

  # Touch button 2
  - platform: esp32_touch
    name: "Button 2"
    icon: mdi:numeric-2-circle
    id: button_2
    pin: GPIO11
    web_server:
      sorting_group_id: grp_extras
    threshold: 10000
    on_press:
      then:
        - rtttl.play: "btn2:d=8,o=5,b=200:d"

    filters:
      - delayed_on: 5ms
      - delayed_off: 10ms

  # Touch button 3
  - platform: esp32_touch
    name: "Button 3"
    icon: mdi:numeric-3-circle
    id: button_3
    pin: GPIO12
    web_server:
      sorting_group_id: grp_extras
    threshold: 10000
    on_press:
      then:
        - rtttl.play: "btn3:d=8,o=5,b=200:e"

    filters:
      - delayed_on: 5ms
      - delayed_off: 10ms

  # Touch button 4
  - platform: esp32_touch
    name: "Button 4"
    icon: mdi:numeric-4-circle
    id: button_4
    pin: GPIO13
    web_server:
      sorting_group_id: grp_extras
    threshold: 10000
    on_press:
      then:
        - rtttl.play: "btn4:d=8,o=5,b=200:g"

    filters:
      - delayed_on: 5ms
      - delayed_off: 10ms
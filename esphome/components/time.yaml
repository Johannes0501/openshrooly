# This syncs the internal clock to NTP in LOCAL TIME
# The timezone is dynamically set based on user selection

time:
  - platform: sntp
    id: sntp_time
    timezone: "UTC0"  # This gets updated dynamically by timezone selector
    on_time_sync:
      then:
        - lambda: |-
            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              ESP_LOGI("time", "SNTP time sync successful: %04d-%02d-%02d %02d:%02d:%02d (LOCAL TIME)",
                       now.year, now.month, now.day_of_month,
                       now.hour, now.minute, now.second);
            } else {
              ESP_LOGI("time", "SNTP time sync attempted, but time not valid yet");
            }
        #- ds1307.write_time: { id: mcp7940n_time }


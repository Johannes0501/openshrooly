# ========================================================================
# BUTTON CONFIGURATION
# Touch capacitive buttons and their hardware sensors
# NOTE: Button binary sensors moved to alerts_simple.yaml to avoid duplicate sections
# ========================================================================

button:
  # Regular Action Button
  - platform: restart
    id: restart_button
    name: "Restart OpenShrooly"
    entity_category: diagnostic

# I2C configuration (Bus A - for capacitive touch inputs)
i2c:
  - id: bus_a
    sda: GPIO3
    scl: GPIO4
    scan: true
    frequency: 100kHz

# Touch Capacitive Sensors (AT42QT1010 chips)
esp32_touch:
  setup_mode: false

# NOTE: Touch sensors moved to sensors.yaml to avoid duplicate sensor: sections
# ========================================================================
# SENSORS CONFIGURATION
# All sensor components for environmental monitoring
# ========================================================================

sensor:
  #=======================================================================
  # SECTION 1: Internal High-Frequency Sensors
  # These publish their raw values every second to the public template sensors.
  #=======================================================================

  - platform: sht4x
    i2c_id: bus_a
    temperature:
      id: temperature
      name: "Current Temperature"
      icon: mdi:thermometer
      internal: true
      web_server:
        sorting_group_id: grp_env

      on_value:
        # Every second, publish the raw value to the public template sensor.
        - sensor.template.publish:
            id: temp_ha
            state: !lambda 'return x;'
    humidity:
      id: humidity
      name: "Current Humidity"
      icon: mdi:water-percent
      internal: true
      web_server:
        sorting_group_id: grp_env

      on_value:
        # First, run the local script with every new value.
        - script.execute: humidity_control_manager
        # Then, publish the raw value to the public template sensor.
        - sensor.template.publish:
            id: humidity_ha
            state: !lambda 'return x;'

    # Heater configuration to prevent condensation in high humidity environments
    heater_max_duty: 0.02    # 2% duty cycle - conservative setting for mushroom growing
    heater_power: Med        # Medium power to avoid excessive heat
    heater_time: Short       # 100ms heating time to minimize measurement disruption

    update_interval: 2s      # Increased from 1s to account for heater operation

  - platform: pulse_counter
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
    id: fan_tach_internal
    name: "Current Air Exchange Fan Speed"
    icon: mdi:fan
    internal: true
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_env
    filters:
      - multiply: 0.5
    update_interval: 1s
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    use_pcnt: false  # Use the newer pulse counter implementation
    on_value:
      # Every second, publish the raw value to the public template sensor.
      - sensor.template.publish:
          id: fan_tach_ha
          state: !lambda 'return x;'

  - platform: adc
    pin: GPIO4  # ADC_CHANNEL_3 for hardware v0.04
    name: "VBUS ADC Raw"
    icon: mdi:sine-wave
    id: vbus_adc_raw
    attenuation: auto
    internal: true
    web_server:
      sorting_group_id: grp_hidden
    update_interval: 1s
    accuracy_decimals: 3

  # Converted VBUS voltage using hardware v0.04 regression formula
  - platform: template
    name: "VBUS Voltage"
    icon: mdi:lightning-bolt
    id: vbus_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 1s
    internal: true
    web_server:
      sorting_group_id: grp_env
    lambda: |-
      float v = id(vbus_adc_raw).state;


      // ChatGPT estimate
      float voltage =
          8.70370f * v          // linear term = divider ratio at low V
        - 0.23626f * v * v
        + 0.17501f * v * v * v;


      return voltage;
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x < 10.0;'
            then:
              - lambda: |-
                  ESP_LOGW("power", "Low voltage detected: %.2fV - Displaying power off message", x);
              - component.update: my_display


  - platform: template
    name: "Water Level Percent"
    icon: mdi:cup-water
    id: water_level_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    web_server:
      sorting_group_id: grp_env
      sorting_weight: 30
    lambda: |-
      // Differential water level detection algorithm
      auto device = new i2c::I2CDevice();
      device->set_i2c_bus(id(bus_a));
      device->set_i2c_address(0x6C);

      // I2C Memory Map addresses for sensors
      uint8_t regs[] = {0x03, 0x07, 0x0B, 0x0F};  // Empty, Low, Mid, High
      uint32_t sensor_vals[4] = {0};
      uint8_t data[4];

      // 1. Read 32-bit values from each sensor
      for (int i = 0; i < 4; i++) {
        if (device->read_register(regs[i], data, 4)) { // note true and false seem to be flipped!
          ESP_LOGW("water", "Read failed at 0x%02X", regs[i]);
          delete device;
          return NAN;   // Home Assistant shows N/A
        }
        // Little-endian 32-bit value
        sensor_vals[i] = (uint32_t)data[0]
                       | ((uint32_t)data[1] << 8)
                       | ((uint32_t)data[2] << 16)
                       | ((uint32_t)data[3] << 24);
      }

      // Determine water level - always use calibration values (defaults or user-set)
      float water_level;

      // Always use the calibrated approach since we have default values
      // UI will still show "not calibrated" unless user explicitly calibrates

      // Calculate how much each sensor has changed from dry state
      // Note: Values typically DROP when water is present (from ~42000 to ~39000)
      // So we look at the signed difference, not absolute
      int s0_change = (int)id(water_cal_s0_dry) - (int)sensor_vals[0];
      int s1_change = (int)id(water_cal_s1_dry) - (int)sensor_vals[1];
      int s2_change = (int)id(water_cal_s2_dry) - (int)sensor_vals[2];
      int s3_change = (int)id(water_cal_s3_dry) - (int)sensor_vals[3];

      // Log raw sensor values and changes
      // ESP_LOGI("water", "Raw: S0=%u, S1=%u, S2=%u, S3=%u",
      //          sensor_vals[0], sensor_vals[1], sensor_vals[2], sensor_vals[3]);
      // ESP_LOGI("water", "Changes from dry: S0=%d, S1=%d, S2=%d, S3=%d",
      //          s0_change, s1_change, s2_change, s3_change);

      // Based on your actual measurements:
      // S0 drops ~2600 when water reaches it (at 14% actual)
      // S1 drops ~2000 when water reaches it (at 43% actual)
      // S2 drops ~2200 when water reaches it (at 71% actual)
      // S3 drops ~1400 when water reaches it (at 100% actual)

      // Calculate thresholds with hysteresis to prevent fluctuation
      // When full, typical changes are: S0=~2000, S1=~1500, S2=~1700, S3=~750
      // Set thresholds well below the "full" values to prevent toggling
      bool s0_wet = (s0_change > 1200);  // S0 detects water (well below full value ~2000)
      bool s1_wet = (s1_change > 1000);  // S1 detects water (well below full value ~1500)
      bool s2_wet = (s2_change > 1200);  // S2 detects water (well below full value ~1700)
      bool s3_wet = (s3_change > 500);   // S3 detects water (well below full value ~750)

      // ESP_LOGI("water", "Wet sensors: S0=%d, S1=%d, S2=%d, S3=%d",
      //          s0_wet, s1_wet, s2_wet, s3_wet);

      // Calculate percentage based on sensor states and actual fill levels
      if (s3_wet) {
        // Water at S3 - tank full or overfull (100-110%)
        // S3 change ranges from ~500 (just triggered) to ~1500+ (very full)
        float excess = (float)(s3_change - 500);
        water_level = 100 + fmin(excess / 1000.0f * 10.0f, 10.0f);   // 100-110%
        // ESP_LOGI("water", "S3 wet - excess: %.0f, level: %.1f%%", excess, water_level);
      }
      else if (s2_wet) {
        // Water at S2 but not S3 (71-100%)
        if (s3_change < 250) {
          water_level = 71 + (s2_change - 1200) / 600.0f * 14.0f;    // 71-85%
        } else {
          water_level = 85 + (s3_change - 250) / 250.0f * 15.0f;     // 85-100%
        }
        // ESP_LOGI("water", "S2 wet, S3 not - s3_change: %d, level: %.1f%%", s3_change, water_level);
      }
      else if (s1_wet) {
        // Water at S1 but not S2 (43-71%)
        if (s2_change < 600) {
          water_level = 43 + (s1_change - 1000) / 800.0f * 14.0f;   // 43-57%
        } else {
          water_level = 57 + (s2_change - 600) / 600.0f * 14.0f;    // 57-71%
        }
        // ESP_LOGI("water", "S1 wet, S2 not - s2_change: %d, level: %.1f%%", s2_change, water_level);
      }
      else if (s0_wet) {
        // Water at S0 but not S1 (14-43%)
        // Interpolate based on S1 approach
        if (s1_change < 500) {
          water_level = 14 + (s0_change - 1200) / 800.0f * 15.0f;   // 14-29%
        } else {
          water_level = 29 + (s1_change - 500) / 500.0f * 14.0f;    // 29-43%
        }
        // ESP_LOGI("water", "S0 wet, S1 not - s1_change: %d, level: %.1f%%", s1_change, water_level);
      }
      else if (s0_change >= 500) {
        // S0 starting to detect but not fully triggered (5-14%)
        water_level = 5 + (s0_change - 500) / 700.0f * 9.0f;
        // ESP_LOGI("water", "S0 approaching - s0_change: %d, level: %.1f%%", s0_change, water_level);
      }
      else {
        // Very small change - tank is empty (0-5%)
        water_level = fmax(0, s0_change / 500.0f * 5.0f);
        // ESP_LOGI("water", "Empty - s0_change: %d, level: %.1f%%", s0_change, water_level);
      }

      // Allow up to 110% for overflow detection
      water_level = fmax(0.0f, fmin(110.0f, water_level));

      // Log the final calculated percentage
      // ESP_LOGI("water", "Level: %.1f%%", water_level);

      delete device;
      return water_level;
    on_value:
      then:
        - lambda: |-
            static int last_warning_hour = -1;
            auto t = id(sntp_time).now();
            if (!t.is_valid()) return;

            int current_hour = t.hour;

            // Only warn once per hour (reset when hour changes)
            if (current_hour != last_warning_hour) {
              if (x >= 105.0f) {
                ESP_LOGE("water", "⚠️ WATER_OVERFLOW: %.0f%% - Tank overfilled!", x);
                last_warning_hour = current_hour;
              } else if (x < 10.0f) {
                ESP_LOGE("water", "⚠️ WATER_EMPTY: %.0f%% - Tank empty!", x);
                last_warning_hour = current_hour;
              } else if (x < 20.0f) {
                ESP_LOGW("water", "⚠️ WATER_LOW: %.0f%% - Refill soon", x);
                last_warning_hour = current_hour;
              }
            }

  #=======================================================================
  # SECTION 2: Public (Smoothed) Template Sensors for Home Assistant
  # These receive updates every second, but use FILTERS to decide when
  # to forward a new state to Home Assistant.
  #=======================================================================

  - platform: template
    name: "Temperature"
    icon: mdi:thermometer
    id: temp_ha
    entity_category: "diagnostic"
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    web_server:
      sorting_group_id: grp_hidden
    filters:
      - throttle: 30s

  - platform: template
    name: "Humidity"
    icon: mdi:water-percent
    id: humidity_ha
    entity_category: "diagnostic"
    accuracy_decimals: 1
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: grp_hidden
    filters:
      - throttle: 30s

  - platform: template
    name: "Air Exchange Fan Speed"
    icon: mdi:fan
    id: fan_tach_ha
    entity_category: "diagnostic"
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_hidden
      sorting_weight: 40
    filters:
      - delta: 25.0
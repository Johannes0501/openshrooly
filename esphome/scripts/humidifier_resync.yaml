# ========================================================================
# HUMIDIFIER RESYNC INTERVAL ITEM
# Periodically checks if state is correct and fixes if needed
# This handles cases where the humidifier didn't start at boot
# ========================================================================

interval: 30s  # Every 30 seconds, verify state is correct
then:
  - lambda: |-
      // Check if humidifier should be ON based on humidity
      if (!isnan(id(humidity).state) && !isnan(id(target_humidity).state)) {
        float h = id(humidity).state;
        float t = id(target_humidity).state;
        float hyst = id(humidity_hysteresis).state;

        // Should be ON if humidity is below target - hysteresis
        bool should_be_on = h < (t - hyst);

        // Should be OFF if humidity is above target + hysteresis
        bool should_be_off = h >= (t + hyst);

        // Only intervene if state is wrong
        if (should_be_on && !id(humidifier_on_flag)) {
          ESP_LOGW("humidifier_resync", "⚠️ Humidifier should be ON but isn't - calling control manager (%.1f%% < %.1f%% - %.2f%%)", h, t, hyst);
          id(humidity_control_manager).execute();
        } else if (should_be_off && id(humidifier_on_flag)) {
          ESP_LOGW("humidifier_resync", "⚠️ Humidifier should be OFF but isn't - calling control manager (%.1f%% >= %.1f%% + %.2f%%)", h, t, hyst);
          id(humidity_control_manager).execute();
        }
      }
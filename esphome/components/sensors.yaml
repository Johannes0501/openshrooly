# ========================================================================
# SENSORS CONFIGURATION
# All sensor components for environmental monitoring
# ========================================================================

sensor:
  #=======================================================================
  # SECTION 1: Internal High-Frequency Sensors
  # These publish their raw values every second to the public template sensors.
  #=======================================================================

  - platform: sht4x
    i2c_id: bus_a
    temperature:
      id: temperature
      name: "Current Temperature"
      icon: mdi:thermometer
      internal: true
      web_server:
        sorting_group_id: grp_env
      filters:
        - sliding_window_moving_average:
            window_size: 2
            send_every: 1

      on_value:
        # Every second, publish the raw value to the public template sensor.
        - sensor.template.publish:
            id: temp_ha
            state: !lambda 'return x;'
    humidity:
      id: humidity
      name: "Current Humidity"
      icon: mdi:water-percent
      internal: true
      web_server:
        sorting_group_id: grp_env
      filters:
        - sliding_window_moving_average:
            window_size: 2
            send_every: 1

      on_value:
        # First, run the local script with every new value.
        - script.execute: humidity_control_manager
        # Then, publish the raw value to the public template sensor.
        - sensor.template.publish:
            id: humidity_ha
            state: !lambda 'return x;'

    # Heater configuration to prevent condensation in high humidity environments
    heater_max_duty: 0.02    # 2% duty cycle - conservative setting for mushroom growing
    heater_power: Med        # Medium power to avoid excessive heat
    heater_time: Short       # 100ms heating time to minimize measurement disruption

    update_interval: 2s      # Increased from 1s to account for heater operation

  - platform: pulse_counter
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
    id: fan_tach_internal
    name: "Current Air Exchange Fan Speed"
    icon: mdi:fan
    internal: true
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_env
    filters:
      - multiply: 0.5
      - sliding_window_moving_average:
          window_size: 2
          send_every: 1
    update_interval: 1s
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    use_pcnt: false  # Use the newer pulse counter implementation
    on_value:
      # Every second, publish the raw value to the public template sensor.
      - sensor.template.publish:
          id: fan_tach_ha
          state: !lambda 'return x;'

  - platform: adc
    pin: GPIO4  # ADC_CHANNEL_3 for hardware v0.04
    name: "VBUS ADC Raw"
    icon: mdi:sine-wave
    id: vbus_adc_raw
    attenuation: auto
    internal: true
    web_server:
      sorting_group_id: grp_hidden
    update_interval: 1s
    accuracy_decimals: 3

  # Converted VBUS voltage using hardware v0.04 regression formula
  - platform: template
    name: "System Voltage"
    icon: mdi:lightning-bolt
    id: vbus_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 1s
    internal: true
    web_server:
      sorting_group_id: grp_env
    filters:
      - sliding_window_moving_average:
          window_size: 2
          send_every: 1
    lambda: |-
      float v = id(vbus_adc_raw).state;


      // ChatGPT estimate
      float voltage =
          8.70370f * v          // linear term = divider ratio at low V
        - 0.23626f * v * v
        + 0.17501f * v * v * v;


      return voltage;
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x < 10.0;'
            then:
              - lambda: |-
                  ESP_LOGW("power", "Low voltage detected: %.2fV - Displaying power off message", x);
              - component.update: my_display


  - platform: template
    name: "Water Level"
    icon: mdi:cup-water
    id: water_level_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never  # Will be updated by interval
    web_server:
      sorting_group_id: grp_env
      sorting_weight: 30
    lambda: |-
      return {};
    on_value:
      then:
        - lambda: |-
            static int last_warning_hour = -1;
            auto t = id(sntp_time).now();
            if (!t.is_valid()) return;

            int current_hour = t.hour;

            // Only warn once per hour (reset when hour changes)
            if (current_hour != last_warning_hour) {
              if (x >= 105.0f) {
                ESP_LOGE("water", "⚠️ WATER_OVERFLOW: %.0f%% - Tank overfilled!", x);
                last_warning_hour = current_hour;
              } else if (x < 10.0f) {
                ESP_LOGE("water", "⚠️ WATER_EMPTY: %.0f%% - Tank empty!", x);
                last_warning_hour = current_hour;
              } else if (x < 20.0f) {
                ESP_LOGW("water", "⚠️ WATER_LOW: %.0f%% - Refill soon", x);
                last_warning_hour = current_hour;
              }
            }

  #=======================================================================
  # SECTION 2: Public (Smoothed) Template Sensors for Home Assistant
  # These receive updates every second, but use FILTERS to decide when
  # to forward a new state to Home Assistant.
  #=======================================================================

  - platform: template
    name: "Temperature"
    icon: mdi:thermometer
    id: temp_ha
    entity_category: "diagnostic"
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    web_server:
      sorting_group_id: grp_hidden
    filters:
      - throttle: 30s

  - platform: template
    name: "Humidity"
    icon: mdi:water-percent
    id: humidity_ha
    entity_category: "diagnostic"
    accuracy_decimals: 1
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: grp_hidden
    filters:
      - throttle: 30s

  - platform: template
    name: "Air Exchange Fan Speed"
    icon: mdi:fan
    id: fan_tach_ha
    entity_category: "diagnostic"
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    web_server:
      sorting_group_id: grp_hidden
      sorting_weight: 40
    filters:
      - delta: 25.0

  # =======================================================================
  # Stabilized Current Humidity Sensor
  # =======================================================================
  # This sensor provides a stabilized humidity reading that compensates for
  # artificial drops in humidity when the air exchange fan is running.
  #
  # Problem: When the air exchange fan turns on, it draws in drier outside air
  # which causes the humidity sensor to report artificially low readings. This
  # can cause the humidity control system to overcompensate by running the
  # humidifier unnecessarily.
  #
  # Solution: This sensor "freezes" the humidity value at the last stable reading
  # from before the fan started, and continues to report that frozen value while:
  # 1. The air exchange fan is currently running (air_exchange_on_flag = true)
  # 2. For 45 seconds after the fan stops (to allow air to settle and mix)
  #
  # After the 45-second settling period, the sensor resumes reporting live
  # humidity values from the physical sensor. This provides more accurate
  # humidity readings for control purposes during air exchange cycles.
  # =======================================================================
  - platform: template
    name: "Stabilized Current Humidity"
    icon: mdi:water-percent
    id: humidity_stabilized
    internal: true
    accuracy_decimals: 1
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: grp_hidden
    update_interval: 2s
    lambda: |-
      auto t = id(sntp_time).now();
      int current_time = t.is_valid() ? t.timestamp : 0;

      // Check if fan is currently on or recently stopped (within 45 seconds)
      bool fan_affecting = id(air_exchange_on_flag) ||
                           (id(fan_stopped_timestamp) > 0 &&
                            current_time - id(fan_stopped_timestamp) < 45);

      if (fan_affecting) {
        // Return last stable value if fan is affecting readings
        return id(last_stable_humidity);
      } else {
        // Update and return current humidity
        id(last_stable_humidity) = id(humidity).state;
        return id(humidity).state;
      }
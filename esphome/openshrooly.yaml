esphome:
  name: openshrooly
  name_add_mac_suffix: true
  friendly_name: OpenShrooly
  project:
    name: grahamsz.openshrooly
    version: 0.4.1
  platformio_options:
    build_flags:
      - -Wno-cpp  # Suppress preprocessor warnings (including deprecation warnings)

  on_boot:
    priority: 600  # Very early boot
    then:
      # Start SWD programming immediately
      - lambda: |-
          ESP_LOGI("boot", "Starting SWD programming early...");
      - swd_programmer.program: swd

      # Wait 3 seconds for SWD to get going, then LVGL will initialize
      - delay: 3s

      - lambda: |-
          ESP_LOGI("boot", "LVGL should initialize now with main page...");

      # Continue with normal boot sequence after a bit
      - delay: 2s
      - script.stop: fan_rpm_check
      - script.stop: fan_stop_check
      - script.execute: air_exchange_manager
      - script.execute: touch_button_monitor

      # Wait until humidity is valid
      - wait_until:
          condition:
            lambda: 'return !isnan(id(humidity).state);'
          timeout: 30s

      # Start humidity control
      - script.execute: humidity_control_manager

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: INFO
#  logs:
    # Suppress component timing warnings
    #component: ERROR  # Only show errors, not warnings about timing
    #safe_mode: ERROR  # Suppress safe_mode timing warnings
    # Optionally suppress other noisy components
    # sensor: WARN  # Reduce sensor logging
    # time: WARN    # Reduce time sync logging

api:
  reboot_timeout: 0s

ota:
  - platform: esphome


external_components:
  - source: 
      type: local
      path: external_components

wifi:
  ap:
    ssid: "OpenShrooly"
    manual_ip:
      static_ip: 192.168.4.1
      gateway: 192.168.4.1
      subnet: 255.255.255.0

  on_connect:
    then:
      - component.update: my_display   

captive_portal:

# Include text sensors early so scripts can reference them
<<: !include components/text_sensors.yaml

script:
  # This runs in a continuous loop (or when the timing is changed)
  - !include scripts/air_exchange_manager.yaml

  # This runs any time the humidity changes (usually once a second)
  - !include scripts/humidity_control_manager.yaml
  - !include scripts/humidifier_pwm_control.yaml

  # This runs when the light values change or every 30 seconds
  - !include scripts/lighting_control_manager.yaml

  # One-time monitoring checks triggered by state changes
  - !include scripts/fan_rpm_check.yaml
  - !include scripts/fan_stop_check.yaml
  - !include scripts/humidifier_effectiveness_check.yaml

  # Touch button monitoring script (polls every 200ms)
  - !include scripts/touch_button_monitor.yaml

  # Water level calculation script (called by an interval)
  - !include scripts/water_level_calculator.yaml

  # Alert beep patterns
  - !include scripts/alert_beeps.yaml

interval:
  # Water level check interval (every 30 seconds)
  - interval: 1s
    then:
      - script.execute: lighting_control_manager

  - interval: 60s
    then:
      - lambda: |-
          auto t = id(sntp_time).now();
          if (t.is_valid()) {
            ESP_LOGI("time",
              "Local time: %04d-%02d-%02d %02d:%02d:%02d",
              t.year, t.month, t.day_of_month,
              t.hour, t.minute, t.second
            );
          } else {
            ESP_LOGW("time", "SNTP time not valid yet");
          }


  - interval: 30s # Every 30 seconds, run the water level calculator
    then:
      - script.execute: water_level_calculator          

  # Update LVGL labels every 10 seconds
  - interval: 10s
    then:
      - lvgl.label.update:
          id: temp_label
          text: !lambda |-
            if (id(temperature).has_state()) {
              char str[20];
              sprintf(str, "Temp: %.1f°C", id(temperature).state);
              return std::string(str);
            }
            return std::string("Temp: --.-°C");

      - lvgl.label.update:
          id: humidity_label
          text: !lambda |-
            if (id(humidity).has_state()) {
              char str[20];
              sprintf(str, "Humidity: %.1f%%", id(humidity).state);
              return std::string(str);
            }
            return std::string("Humidity: --.-%");

      - lvgl.label.update:
          id: fan_label
          text: !lambda |-
            if (id(air_exchange_on_flag)) {
              return std::string("Fan: ON");
            } else {
              return std::string("Fan: OFF");
            }

      - lvgl.label.update:
          id: humidifier_label
          text: !lambda |-
            if (id(humidifier_on_flag)) {
              return std::string("Humidifier: ON");
            } else {
              return std::string("Humidifier: OFF");
            }

      - lvgl.label.update:
          id: light_label
          text: !lambda |-
            if (id(lights_on_flag)) {
              return std::string("Light: ON");
            } else {
              return std::string("Light: OFF");
            }

      - lvgl.label.update:
          id: wifi_label
          text: !lambda |-
            if (WiFi.isConnected()) {
              return std::string("WiFi: Connected");
            } else {
              return std::string("WiFi: AP Mode");
            }

      - lvgl.label.update:
          id: time_label
          text: !lambda |-
            auto time = id(sntp_time).now();
            if (time.is_valid()) {
              char str[10];
              sprintf(str, "%02d:%02d", time.hour, time.minute);
              return std::string(str);
            }
            return std::string("00:00");

      - lvgl.label.update:
          id: alert_label
          text: !lambda |-
            int count = id(active_alert_count);
            if (count == 0) {
              return std::string("No Alerts");
            } else if (count == 1) {
              return std::string("⚠️ 1 Alert");
            } else {
              char str[20];
              sprintf(str, "⚠️ %d Alerts", count);
              return std::string(str);
            }

      # Force display update
      - component.update: my_display

  - interval: 5min
    then:
      - component.update: my_display


<<: !include components/globals.yaml
<<: !include components/calibration.yaml
<<: !include components/selects.yaml
<<: !include components/controls.yaml
<<: !include components/time.yaml
<<: !include components/communication.yaml
<<: !include components/outputs.yaml
<<: !include components/sensors.yaml
<<: !include components/display.yaml
<<: !include components/buttons.yaml
<<: !include components/alerts_simple.yaml
<<: !include components/lvgl_simple.yaml
<<: !include components/webserver.yaml



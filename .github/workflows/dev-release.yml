name: Build development firmware

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'dev-*'
  workflow_dispatch:
    inputs:
      publish_dev_outputs:
        description: 'Push dev-latest/dev-YYYY-MM-DD tags and prereleases (manual runs only)'
        type: boolean
        default: false
      publish_release:
        description: 'Publish a production release (manual runs only)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: "latest"

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref_name, 'dev-'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure publication modes
        env:
          PUBLISH_DEV_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_dev_outputs == 'true' }}
          PUBLISH_RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
        run: |
          echo "SHOULD_PUBLISH_DEV=false" >> $GITHUB_ENV
          echo "SHOULD_PUBLISH_RELEASE=false" >> $GITHUB_ENV

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "SHOULD_PUBLISH_DEV=true" >> $GITHUB_ENV
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* && "${GITHUB_REF_NAME}" != dev-* ]]; then
            echo "SHOULD_PUBLISH_RELEASE=true" >> $GITHUB_ENV
          fi

          if [[ "${PUBLISH_DEV_INPUT}" == "true" ]]; then
            echo "SHOULD_PUBLISH_DEV=true" >> $GITHUB_ENV
          fi

          if [[ "${PUBLISH_RELEASE_INPUT}" == "true" ]]; then
            echo "SHOULD_PUBLISH_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Compute names
        id: names
        run: |
          DATE_UTC=$(date -u +%Y-%m-%d)
          echo "DATE=${DATE_UTC}" >> $GITHUB_ENV
          echo "DATE_TAG=dev-${DATE_UTC}" >> $GITHUB_ENV
          echo "BUILD_DIR=${{ github.workspace }}/$(basename ${{ github.repository }})" >> $GITHUB_ENV

      - name: Prepare for GitHub build
        run: |
          # Ensure rmt_channel line is commented out for GitHub build
          sed -i 's/^    rmt_channel: 0/    #rmt_channel: 0/' esphome/components/outputs.yaml
          echo "Commented out rmt_channel line in outputs.yaml for GitHub build"

          # If this is a version tag (e.g., 0.4.0), update the version in openshrooly.yaml
          if [[ "${{ github.ref }}" == refs/tags/* ]] && [[ ! "${{ github.ref_name }}" == dev-* ]]; then
            echo "Updating version to ${{ github.ref_name }} in openshrooly.yaml"
            sed -i 's/^    version: .*/    version: ${{ github.ref_name }}/' esphome/openshrooly.yaml
            echo "Version updated to ${{ github.ref_name }}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build webapp
        run: |
          cd webapp
          npm install
          npm run build

      - name: Embed static files
        run: |
          cd esphome
          python3 external_components/web_server/embed_static_files.py ../webapp/out external_components/web_server/static_files.h external_components/web_server/static_files.cpp

      - name: Build firmware (once)
        id: build
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome/openshrooly.yaml
          complete-manifest: true
          release-summary: "Dev build from ${{ github.ref }} @ ${{ github.sha }}"
          version: "${{ env.VERSION }}"

      # ----- Dev "latest" moving tag -----
      - name: Tag dev-latest
        if: env.SHOULD_PUBLISH_DEV == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f dev-latest $GITHUB_SHA
          git push -f origin dev-latest

      # ----- Dated daily tag (keeps ~30 days) -----
      - name: Tag dated daily build
        if: env.SHOULD_PUBLISH_DEV == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f "${DATE_TAG}" $GITHUB_SHA
          git push -f origin "${DATE_TAG}"

      # ----- Undated latest prerelease (assets replaced each run) -----
      - name: Publish dev-latest prerelease
        if: env.SHOULD_PUBLISH_DEV == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "openshrooly development build"
          prerelease: true
          replace_assets: true
          make_latest: false
          files: |
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.factory.bin
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.ota.bin
            ${{ steps.build.outputs.name }}/manifest.json

       # Dated dev prerelease
      - name: Publish dated dev prerelease
        if: env.SHOULD_PUBLISH_DEV == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DATE_TAG }}
          name: "openshrooly dev ${{ env.DATE }}"   # <-- fixed
          prerelease: true
          replace_assets: true
          make_latest: false
          files: |
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.factory.bin
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.ota.bin
            ${{ steps.build.outputs.name }}/manifest.json
      
      # Proper release for pushed tags (e.g., 0.1.0)
      - name: Publish release for version tag
        if: env.SHOULD_PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "openshrooly ${{ github.ref_name }}"  # <-- fixed
          prerelease: false
          replace_assets: true
          make_latest: true
          files: |
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.factory.bin
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.ota.bin
            ${{ steps.build.outputs.name }}/manifest.json


      # ----- Actions artifacts (handy for CI consumption) -----
      - name: Upload artifact (by SHA)
        uses: actions/upload-artifact@v4
        with:
          name: openshrooly-dev-${{ github.sha }}
          path: ${{ steps.build.outputs.name }}/*
          retention-days: 90

      - name: Upload artifact (latest)
        uses: actions/upload-artifact@v4
        with:
          name: openshrooly-dev-latest
          path: ${{ steps.build.outputs.name }}/*
          retention-days: 30

      - name: Upload artifact (dated)
        uses: actions/upload-artifact@v4
        with:
          name: openshrooly-dev-${{ env.DATE }}
          path: ${{ steps.build.outputs.name }}/*
          retention-days: 30

      # ----- Prune dated prereleases (keep ~30 most recent dev-YYYY-MM-DD) -----
      - name: Prune old dated prereleases
        if: env.SHOULD_PUBLISH_DEV == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 30
            const { data: releases } = await github.request('GET /repos/{owner}/{repo}/releases', {
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100
            })
            const dated = releases
              .filter(r => r.tag_name?.startsWith('dev-') && /\d{4}-\d{2}-\d{2}$/.test(r.tag_name))
              .sort((a,b) => new Date(b.published_at) - new Date(a.published_at))
            const toDelete = dated.slice(keep)
            for (const rel of toDelete) {
              // delete release
              await github.request('DELETE /repos/{owner}/{repo}/releases/{release_id}', {
                owner: context.repo.owner, repo: context.repo.repo, release_id: rel.id
              })
              // delete tag ref if it exists
              try {
                await github.request('DELETE /repos/{owner}/{repo}/git/refs/{ref}', {
                  owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${rel.tag_name}`
                })
              } catch (e) {
                core.info(`Tag ${rel.tag_name} already gone or not deletable: ${e.message}`)
              }
            }

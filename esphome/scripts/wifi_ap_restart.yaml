# Script to restart WiFi AP and DHCP server after boot
# This helps ensure the DHCP server starts properly

- id: wifi_ap_restart
  mode: single
  then:
    - lambda: |-
        // Only restart if we're in AP mode (not connected to WiFi)
        if (!WiFi.isConnected()) {
          ESP_LOGI("wifi", "Device is in AP mode. Restarting WiFi AP to ensure DHCP server is running...");

          // Disable and re-enable AP mode to restart DHCP
          WiFi.softAPdisconnect(true);
          delay(500);

          // Reconfigure AP with same settings
          IPAddress local_IP(192, 168, 4, 1);
          IPAddress gateway(192, 168, 4, 1);
          IPAddress subnet(255, 255, 255, 0);

          WiFi.softAPConfig(local_IP, gateway, subnet);
          WiFi.softAP("OpenShrooly");

          ESP_LOGI("wifi", "WiFi AP restarted. IP: %s", WiFi.softAPIP().toString().c_str());
          ESP_LOGI("wifi", "DHCP server should now be active");
        } else {
          ESP_LOGI("wifi", "Device is connected to WiFi. Skipping AP restart.");
        }
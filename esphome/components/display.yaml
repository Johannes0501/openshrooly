# ========================================================================
# DISPLAY CONFIGURATION
# E-paper display setup and rendering
# ========================================================================

# Fonts for display
font:
  - file: 'fonts/spleen-6x12.bdf'
    id: font1

# Background image
image:
  - file: "images/background.bmp"
    id: background
    type: BINARY

# E-paper Display Configuration
display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO8
    dc_pin: GPIO48
    busy_pin: GPIO38
    reset_pin: GPIO21
    rotation: 90°
    model: 2.90inv2-r2
    full_update_every: 3600    # Full refresh every hour
    update_interval: 60s        # Partial refresh every minute
    auto_clear_enabled: false
    lambda: |-
      // Set up state variables to track across refreshes
      static bool has_drawn_background = false;
      static bool was_low_voltage = false;
      static String previous_ssid = "";
      static String previous_ip = "";

      // Check for low voltage condition first
      if (id(vbus_voltage).state < 10.0) {
        // Clear the entire display
        it.fill(COLOR_OFF);

        // Draw power off message in center of screen
        it.printf(it.get_width() / 2, it.get_height() / 2 - 10, id(font1),
                  TextAlign::CENTER, "POWER OFF");
        it.printf(it.get_width() / 2, it.get_height() / 2 + 10, id(font1),
                  TextAlign::CENTER, "Low Voltage: %.1fV", id(vbus_voltage).state);

        was_low_voltage = true;
        has_drawn_background = false;  // Force redraw when power returns
        return;  // Don't draw anything else
      }

      // If recovering from low voltage, force full redraw
      if (was_low_voltage) {
        was_low_voltage = false;
        has_drawn_background = false;
        it.fill(COLOR_OFF);  // Clear the power off message
      }

      // Draw static background once
      if (!has_drawn_background) {
        it.image(0, 0, id(background), COLOR_OFF, COLOR_ON);
        it.printf(135, 20, id(font1), "www.openshrooly.com");
        has_drawn_background = true;
      }

      // Get current WiFi connection state, initialize variables
      bool current_wifi_connected = WiFi.isConnected();
      String current_ssid = "";
      String current_ip = "";

      if (current_wifi_connected) {
        current_ssid = WiFi.SSID();
        current_ip = WiFi.localIP().toString();
      } else {
        current_ssid = "OpenShrooly";
        current_ip = "Waiting to be configured";
      }

      // Update SSID display if it has changed
      if (previous_ssid != current_ssid) {
        it.filled_rectangle(135, 32, 160, 12, COLOR_OFF);
        it.printf(135, 32, id(font1), COLOR_ON, "SSID: %s", current_ssid.c_str());
      }

      // Update local IP display if it has changed
      if (previous_ip != current_ip) {
        it.filled_rectangle(135, 44, 160, 12, COLOR_OFF);
        it.printf(135, 44, id(font1),  COLOR_ON, "IP: %s", current_ip.c_str());
      }

      // Update WiFi state variables
      previous_ssid = current_ssid;
      previous_ip = current_ip;
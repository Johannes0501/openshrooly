# ========================================================================
# SIMPLE ALERTS CONFIGURATION
# Basic alert system with LVGL display integration
# NOTE: Global variables are defined in globals.yaml
# ========================================================================

# Alert binary sensors for monitoring
binary_sensor:
  # Heat requested (for Home Assistant integration)
  - platform: template
    id: heat_requested
    name: "Heat Requested"
    icon: mdi:fire
    device_class: heat
    web_server:
      sorting_group_id: grp_temperature
      sorting_weight: 2

  # Humidifier on status (for web UI)
  - platform: template
    id: humidifier_on
    name: "Humidifier On"
    icon: mdi:air-humidifier
    lambda: 'return id(humidifier_on_flag);'
    web_server:
      sorting_group_id: grp_hidden

  # Air exchange on status (for web UI)
  - platform: template
    id: air_exchange_on
    name: "Air Exchange On"
    icon: mdi:fan
    lambda: 'return id(air_exchange_on_flag);'
    web_server:
      sorting_group_id: grp_hidden

  # Water calibration status (for web UI)
  - platform: template
    id: water_calibrated
    name: "Water Calibrated"
    icon: mdi:water-check
    lambda: 'return id(is_calibrated);'
    web_server:
      sorting_group_id: grp_hidden

  # Humidity control failure alert
  - platform: template
    id: alert_humidity_failure
    name: "Alert: Humidity Control Failure"
    device_class: problem
    icon: mdi:water-off
    internal: false  # Keep exposed to HA
    web_server:
      sorting_group_id: grp_hidden  # Hide from main web UI
    lambda: 'return id(humidity_not_rising_flag);'

  # I2C communication failure alert
  - platform: template
    id: alert_i2c_failure
    name: "Alert: I2C Communication Failure"
    device_class: problem
    icon: mdi:connection
    internal: false  # Keep exposed to HA
    web_server:
      sorting_group_id: grp_hidden  # Hide from main web UI
    lambda: 'return id(i2c_failure_count) > 2;'

  # Fan spinup failure alert
  - platform: template
    id: alert_fan_spinup
    name: "Alert: Fan Start Failure"
    device_class: problem
    icon: mdi:fan-alert
    internal: false  # Keep exposed to HA
    web_server:
      sorting_group_id: grp_hidden  # Hide from main web UI
    lambda: 'return id(fan_spinup_failure);'

  # Temperature too low alert (uses dynamic threshold)
  - platform: template
    id: alert_temp_too_low
    name: "Alert: Temperature Too Low"
    device_class: cold
    icon: mdi:thermometer-low
    internal: false  # Keep exposed to HA
    web_server:
      sorting_group_id: grp_hidden  # Hide from main web UI
    lambda: |-
      if (!id(temperature).has_state()) return false;
      if (!id(temperature_warning_minimum).has_state()) return false;
      return id(temperature).state < id(temperature_warning_minimum).state;

  # Temperature too high alert (uses dynamic threshold)
  - platform: template
    id: alert_temp_too_high
    name: "Alert: Temperature Too High"
    device_class: heat
    icon: mdi:thermometer-high
    internal: false  # Keep exposed to HA
    web_server:
      sorting_group_id: grp_hidden  # Hide from main web UI
    lambda: |-
      if (!id(temperature).has_state()) return false;
      if (!id(temperature_warning_maximum).has_state()) return false;
      return id(temperature).state > id(temperature_warning_maximum).state;

# Text sensor showing active alerts
text_sensor:
  - platform: template
    id: active_alerts_summary
    name: "Active Alerts"
    icon: mdi:alert-circle
    update_interval: 10s
    lambda: |-
      // Count active alerts
      int count = 0;
      std::string summary = "";

      if (id(alert_humidity_failure).state) {
        summary += "Humidity; ";
        count++;
      }
      if (id(alert_i2c_failure).state) {
        summary += "I2C; ";
        count++;
      }
      if (id(alert_fan_spinup).state) {
        summary += "Fan; ";
        count++;
      }
      if (id(alert_temp_too_low).state) {
        summary += "Temp Low; ";
        count++;
      }
      if (id(alert_temp_too_high).state) {
        summary += "Temp High; ";
        count++;
      }

      // Update global count for LVGL display
      id(active_alert_count) = count;

      if (count == 0) {
        return std::string("No alerts");
      } else {
        return summary;
      }

  # Touch button 1 (controlled by touch_button_monitor script via globals)
  - platform: template
    name: "Button 1"
    icon: mdi:numeric-1-circle
    id: button_1
    internal: true  # Prevents sync to Home Assistant
    lambda: 'return id(button_1_state);'
    update_interval: 100ms  # Poll state every 100ms
    web_server:
      sorting_group_id: grp_extras
    on_press:
      - lambda: |-
          ESP_LOGI("ui", "Button 1 pressed - calling ui_navigation_handler");
      - script.execute:
          id: ui_navigation_handler
          button: 1

  # Touch button 2 (controlled by touch_button_monitor script via globals)
  - platform: template
    name: "Button 2"
    icon: mdi:numeric-2-circle
    id: button_2
    internal: true  # Prevents sync to Home Assistant
    lambda: 'return id(button_2_state);'
    update_interval: 100ms  # Poll state every 100ms
    web_server:
      sorting_group_id: grp_extras
    on_press:
      - lambda: |-
          ESP_LOGI("ui", "Button 2 pressed - calling ui_navigation_handler");
      - script.execute:
          id: ui_navigation_handler
          button: 2

  # Touch button 3 (controlled by touch_button_monitor script via globals)
  - platform: template
    name: "Button 3"
    icon: mdi:numeric-3-circle
    id: button_3
    internal: true  # Prevents sync to Home Assistant
    lambda: 'return id(button_3_state);'
    update_interval: 100ms  # Poll state every 100ms
    web_server:
      sorting_group_id: grp_extras
    on_press:
      - lambda: |-
          ESP_LOGI("ui", "Button 3 pressed - calling ui_navigation_handler");
      - script.execute:
          id: ui_navigation_handler
          button: 3

  # Touch button 4 (controlled by touch_button_monitor script via globals)
  - platform: template
    name: "Button 4"
    icon: mdi:numeric-4-circle
    id: button_4
    internal: true  # Prevents sync to Home Assistant
    lambda: 'return id(button_4_state);'
    update_interval: 100ms  # Poll state every 100ms
    web_server:
      sorting_group_id: grp_extras

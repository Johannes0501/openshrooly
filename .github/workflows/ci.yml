name: Firmware CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  esphome-checks:
    name: ESPHome Configuration & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('esphome/openshrooly.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/esphome
          key: ${{ runner.os }}-platformio-${{ hashFiles('esphome/openshrooly.yaml') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.9.0,<2025.10.0"

      - name: Validate configuration
        run: esphome config esphome/openshrooly.yaml

      - name: Compile firmware
        run: esphome compile esphome/openshrooly.yaml

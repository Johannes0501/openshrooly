# This script evaluates humidity against a target setpoint with hysteresis.
# It turns the humidifier fan ON when humidity is below target,
# and OFF when above, while updating a status sensor accordingly.
# This is run every second when the new humidity value comes in
#
# Uses the stabilized humidity sensor to avoid false triggers during air exchange

id: humidity_control_manager
mode: queued
then:
  - lambda: |-
      if (!isnan(id(humidity_stabilized).state) && !isnan(id(target_humidity).state)) {
        float h = id(humidity_stabilized).state;  // Use stabilized humidity
        float t = id(target_humidity).state;

        // Don't control humidifier if stabilized humidity is 0 (sensor not initialized)
        if (h == 0.0f) {
          if (id(humidifier_on_flag)) {
            // Turn off if it was on
            id(humidifier_on_flag) = false;
            id(humidifier_fan).turn_off();
            ESP_LOGW("humidity", "Turning off humidifier - waiting for humidity sensor to initialize");
          }
          // Show waiting status
          id(humidifier_fan_status).publish_state("Waiting to Settle");
          return;
        }

        if (!id(humidifier_on_flag) && h < t - 3.0f) {
          // Turn ON at target - 3%
          id(humidifier_on_flag) = true;
          id(humidifier_fan).turn_on();

          // Schedule effectiveness check (it will save its own start humidity)
          id(humidifier_effectiveness_check).execute();

        } else if (id(humidifier_on_flag) && h > t - 1.0f) {
          // Turn OFF at target - 1% (hysteresis range: -3% to -1%)
          id(humidifier_on_flag) = false;
          id(humidifier_fan).turn_off();
        }

        // Always publish status showing actual humidity, but indicate when suppressed
        auto time_now = id(sntp_time).now();
        int current_time = time_now.is_valid() ? time_now.timestamp : 0;
        bool fan_affecting = id(air_exchange_on_flag) ||
                             (id(fan_stopped_timestamp) > 0 &&
                              current_time - id(fan_stopped_timestamp) < 45);

        float actual_humidity = id(humidity).state;  // Show actual current humidity

        if (id(humidifier_on_flag)) {
          if (fan_affecting) {
            id(humidifier_fan_status).publish_state(
              str_sprintf("ON — humidity %.1f%% (suppressed)", actual_humidity).c_str()
            );
          } else {
            id(humidifier_fan_status).publish_state(
              str_sprintf("ON — humidity %.1f%% (target %.1f%%)", actual_humidity, t).c_str()
            );
          }
        } else {
          if (fan_affecting) {
            id(humidifier_fan_status).publish_state(
              str_sprintf("OFF — humidity %.1f%% (suppressed)", actual_humidity).c_str()
            );
          } else {
            id(humidifier_fan_status).publish_state(
              str_sprintf("OFF — humidity %.1f%% (target %.1f%%)", actual_humidity, t).c_str()
            );
          }
        }
      }

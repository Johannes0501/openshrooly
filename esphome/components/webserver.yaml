web_server:
  id: http_server
  port: 80
  version: 3
  include_internal: true
  css_include: ../assets/esphome.css
  js_include: ../assets/esphome.js
  app_html_include: ../webapp/out/index.html
  sorting_groups:
    - id: grp_system
      name: "System"
      sorting_weight: 5
    - id: grp_air
      name: "Air Exchange"
      sorting_weight: 10
    - id: grp_humidity
      name: "Humidity"
      sorting_weight: 20
    - id: grp_temperature
      name: "Temperature"
      sorting_weight: 25
    - id: grp_lights
      name: "Lights"
      sorting_weight: 30
    - id: grp_env
      name: "Environment"
      sorting_weight: 40

    - id: grp_calibration
      name: "Water Calibration"
      sorting_weight: 90

    - id: grp_extras
      name: "Extras"
      sorting_weight: 100
    - id: grp_hidden
      name: "Internal controls (should be hidden)"
      sorting_weight: 1000

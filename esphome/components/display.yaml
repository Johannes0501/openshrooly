# ========================================================================
# DISPLAY CONFIGURATION
# E-paper display setup for use with LVGL
# ========================================================================

# Fonts for display (if needed for non-LVGL components)
font:
  - file: 'fonts/spleen-6x12.bdf'
    id: font1

# Background image (not used with LVGL)
image:
  - file: "images/background.bmp"
    id: background
    type: BINARY

# E-paper Display Configuration
display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO8
    dc_pin: GPIO48
    busy_pin: GPIO38
    reset_pin: GPIO21
    rotation: 90°
    model: 2.90inv2-r2
    full_update_every: 30      # Full refresh every 30 partial updates
    update_interval: never      # Manual updates only via component.update
    auto_clear_enabled: false   # Required for LVGL
    # No lambda - LVGL handles all display updates
